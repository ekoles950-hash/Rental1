<script>
    const SCRIPT_URL =  "https://script.google.com/macros/s/AKfycbyC_JLl-wwjrnT0xPdKrAW9xXyuCbLo4IcNxQWgy77xnBOpI-54qpOJ-J0w5pSUB4dL/exec";

    async function sendToYouTube(blob, part, btn) {
        btn.innerText = "⏳ SEDANG UPLOAD...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const payload = {
                videoData: reader.result.split(',')[1],
                fileName: `Sengkuni_Part_${part}.mp4`,
                title: document.getElementById('r_title').value + " - Part " + part,
                description: document.getElementById('r_desc').value,
                privacy: document.getElementById('r_privacy').value,
                schedule: document.getElementById('r_schedule').value
            };

            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const text = await res.text();
                if(text.includes("BERHASIL")) {
                    btn.innerText = "✅ MASUK YOUTUBE";
                    btn.style.background = "#ff0000"; // Warna YouTube
                    btn.style.color = "#fff";
                } else {
                    btn.innerText = "❌ GAGAL";
                    console.log(text);
                }
            } catch (e) {
                btn.innerText = "❌ ERROR";
            }
        };
    }
</script>
