<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Maker - Simpan Galeri</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid #333; }
        button { background: #008000; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; color: #00ff00; }
        canvas, video { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🎬 SENGKUNI MAKER</h3>
        <input type="file" id="v1_in" accept="video/*" style="width:100%; margin-bottom:10px;">
        <input type="file" id="v2_in" accept="video/*" style="width:100%;">
        <button id="gas">GABUNG & SIMPAN KE HP</button>
        <div id="status">Tinggal download, upload manual ke YT Mas.</div>
    </div>
    <video id="v1" loop crossorigin="anonymous"></video>
    <video id="v2" loop muted crossorigin="anonymous"></video>
    <canvas id="c" width="720" height="1280"></canvas>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const gas = document.getElementById('gas');

        document.getElementById('v1_in').onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); };
        document.getElementById('v2_in').onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); };

        gas.onclick = () => {
            if (!v1.src || !v2.src) return alert("Pilih video dulu!");
            gas.disabled = true;
            document.getElementById('status').innerText = "⏳ Sedang Proses 15 Detik...";

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(v1);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest); source.connect(audioCtx.destination);

            v1.play(); v2.play();
            const stream = new MediaStream([...canvas.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
            const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];

            rec.ondataavailable = (e) => chunks.push(e.data);
            rec.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = "Sengkuni_" + Date.now() + ".webm";
                a.click();
                document.getElementById('status').innerText = "✅ Berhasil Disimpan di Galeri!";
                gas.disabled = false;
            };

            function draw() {
                if (rec.state === "recording") {
                    ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                    ctx.drawImage(v2, 40, canvas.height - 350, 220, 300);
                    requestAnimationFrame(draw);
                }
            }
            rec.start(); draw();
            setTimeout(() => { rec.stop(); v1.pause(); v2.pause(); }, 15000);
        };
    </script>
</body>
</html>
