<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Maker - Mas Eko</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 10px; }
        .input-area { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; }
        /* Area Video Utama (Penuh) */
        .video-container { 
            position: relative; 
            width: 340px; 
            height: 600px; 
            margin: 0 auto; 
            background: #222; 
            overflow: hidden;
            border: 2px solid #333;
        }
        #mainVid { width: 100%; height: 100%; object-fit: cover; }
        /* Area Video Reaksi Mas Eko (Kotak Kecil Kiri Bawah) */
        #reactionVid { 
            position: absolute; 
            bottom: 15px; 
            left: 15px; 
            width: 110px; 
            height: 110px; 
            border-radius: 10px; 
            border: 2px solid #ff0000; 
            object-fit: cover;
            z-index: 10;
        }
        button { background: #ff0000; color: #fff; border: none; padding: 15px; border-radius: 8px; width: 90%; font-weight: bold; margin-top: 10px; }
        #dlBtn { background: #00ff00; color: #000; display: none; margin-top: 10px; text-decoration: none; padding: 15px; display: none; }
    </style>
</head>
<body>

    <div class="input-area">
        1. Video Target (Utama): <input type="file" id="f1" accept="video/*"><br><br>
        2. Video Mas Eko (Reaksi): <input type="file" id="f2" accept="video/*">
    </div>

    <div class="video-container" id="captureBox">
        <video id="mainVid" autoplay loop muted></video>
        <video id="reactionVid" autoplay loop muted></video>
    </div>

    <button id="recBtn">MULAI REKAM (15 DETIK)</button>
    <a id="dlBtn">DOWNLOAD HASIL</a>

    <script>
        const v1 = document.getElementById('mainVid');
        const v2 = document.getElementById('reactionVid');
        const f1 = document.getElementById('f1');
        const f2 = document.getElementById('f2');
        const recBtn = document.getElementById('recBtn');
        const dlBtn = document.getElementById('dlBtn');

        f1.onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); };
        f2.onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); };

        let chunks = [];
        recBtn.onclick = async () => {
            recBtn.innerText = "SEDANG MEREKAM...";
            recBtn.disabled = true;
            
            const stream = document.getElementById('captureBox').captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                dlBtn.href = url;
                dlBtn.download = "reaksi_mas_eko.webm";
                dlBtn.style.display = "block";
                recBtn.innerText = "SELESAI!";
            };

            recorder.start();
            setTimeout(() => { recorder.stop(); }, 15000); // Pas 15 detik
        };
    </script>
</body>
</html>
