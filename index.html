<div class="box">
    <h3>🎬 SENGKUNI x REPLIZ PRO</h3>
    
    <input type="text" id="v_title" placeholder="Ketik Judul Postingan...">
    
    <div class="label" style="color: #00ff00; font-weight: bold;">✅ Hubungkan ke YouTube:</div>
    <div style="text-align: left; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
        <input type="checkbox" id="yt_channel" checked style="width: auto; margin-right: 10px;"> 
        <span style="font-size: 14px;">YouTube Pantelo (Active)</span>
    </div>

    <div class="label">Opsi Pengiriman:</div>
    <select id="postMode" onchange="toggleDate()">
        <option value="now">🚀 Kirim Sekarang (Langsung Post)</option>
        <option value="later">📅 Jadwalkan Konten</option>
    </select>
    
    <input type="datetime-local" id="v_date" style="display:none;">

    <div class="label">Ukuran & Zoom:</div>
    <select id="ratio">
        <option value="9:16">Shorts (9:16)</option>
        <option value="16:9">YouTube (16:9)</option>
    </select>
    
    <input type="file" id="v1_in" accept="video/*">
    <div class="label">Video Utama</div>
    <input type="file" id="v2_in" accept="video/*">
    <div class="label">Video Reaksi</div>
    
    <button id="gasBtn">GABUNG & POST KE REPLIZ</button>
    <div id="status">Ready Mas Eko!</div>
</div>

<script>
    // Fungsi munculin input tanggal kalau pilih 'Jadwalkan'
    function toggleDate() {
        const mode = document.getElementById('postMode').value;
        document.getElementById('v_date').style.display = (mode === 'later') ? 'block' : 'none';
    }

    // Bagian rec.onstop (Ganti logic pengirimannya)
    rec.onstop = async () => {
        status.innerText = "🚀 MENGIRIM KE REPLIZ...";
        const blob = new Blob(chunks, { type: 'video/mp4' });
        const reader = new FileReader();

        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            
            // LOGIKA WAKTU REPLIZ
            let finalDate;
            if (document.getElementById('postMode').value === 'now') {
                let now = new Date();
                now.setMinutes(now.getMinutes() - 1); // Biar langsung sikat
                finalDate = now.toISOString();
            } else {
                finalDate = new Date(document.getElementById('v_date').value).toISOString();
            }

            const formData = new URLSearchParams();
            formData.append('file', base64);
            formData.append('title', document.getElementById('v_title').value);
            formData.append('scheduleAt', finalDate);
            
            // Kirim status centang (jika dicentang maka kirim ID Akun)
            const isYtChecked = document.getElementById('yt_channel').checked;
            formData.append('accountId', isYtChecked ? "680affa5ce12f2f72916f67e" : "");

            try {
                const response = await fetch(URL_GAS, { method: 'POST', body: formData });
                status.innerText = "✅ " + await response.text();
            } catch (err) {
                status.innerText = "❌ Gagal Terhubung ke Repliz.";
            }
            gasBtn.disabled = false;
        };
        reader.readAsDataURL(blob);
    };
</script>
