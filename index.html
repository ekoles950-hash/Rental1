<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Konten Maker - Mas Eko</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 15px; margin: 0; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-size: 14px; color: #aaa; text-align: left; }
        input { margin: 10px 0; width: 100%; color: white; display: block; background: #333; border: 1px solid #444; padding: 8px; border-radius: 5px; }
        button { background: #ff0000; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #555; }
        #status { margin-top: 15px; color: #ffcc00; font-weight: bold; font-size: 14px; }
        #dlArea { display: none; margin-top: 20px; border-top: 2px solid #444; padding-top: 20px; }
        .btn-dl { background: #00ff00; color: #000; text-decoration: none; padding: 20px; display: block; border-radius: 12px; font-weight: bold; font-size: 18px; }
        canvas, video { display: none; }
    </style>
</head>
<body>

    <h3>🚀 Auto Merge & Log Spreadsheet</h3>
    <div class="card">
        <label>1. Video Utama (Ada Suara):</label>
        <input type="file" id="vid1" accept="video/*">
        
        <label>2. Video Reaksi Mas Eko (Diam/Mute):</label>
        <input type="file" id="vid2" accept="video/*">
        
        <button id="goBtn">PROSES VIDEO & LAPOR</button>
        <div id="status">Siap memproses konten...</div>
    </div>

    <div id="dlArea">
        <p>✅ VIDEO SIAP! Klik tombol di bawah:</p>
        <a id="linkDl" class="btn-dl">DOWNLOAD & SIMPAN KE SHEETS</a>
    </div>

    <video id="v1" loop crossorigin="anonymous"></video>
    <video id="v2" loop muted crossorigin="anonymous"></video>
    <canvas id="c" width="720" height="1280"></canvas>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const dlArea = document.getElementById('dlArea');
        const status = document.getElementById('status');
        const goBtn = document.getElementById('goBtn');

        // URL Web App Mas Eko yang sudah aktif
        const scriptURL = "https://script.google.com/macros/s/AKfycbzx_zyOBw05J8XVcjCBMpuNtF6tcyN1XpJhfNFHcoZZ5n945EOfYOEwwV8fp2lt4mY/exec";

        document.getElementById('vid1').onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); };
        document.getElementById('vid2').onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); };

        goBtn.onclick = async () => {
            if (!v1.src || !v2.src) return alert("Pilih kedua video dulu, Mas!");
            
            status.innerText = "⏳ SEDANG MENGGABUNGKAN (15 DETIK)...";
            goBtn.disabled = true;
            dlArea.style.display = "none";
            
            v1.play(); v2.play();

            // Setup Audio: Hanya ambil dari Video Utama (v1)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();
            const source1 = audioCtx.createMediaElementSource(v1);
            source1.connect(dest);
            source1.connect(audioCtx.destination);

            const videoStream = canvas.captureStream(30);
            const combinedStream = new MediaStream([
                ...videoStream.getVideoTracks(),
                ...dest.stream.getAudioTracks()
            ]);

            const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
            let chunks = [];

            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const dlLink = document.getElementById('linkDl');
                const fileName = "konten_eko_" + Date.now() + ".webm";
                
                dlLink.href = url;
                dlLink.download = fileName;
                
                // Kirim data ke Spreadsheet saat tombol download diklik
                dlLink.onclick = () => {
                    fetch(scriptURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ fileName: fileName })
                    });
                    alert("Data tercatat di Spreadsheet Konten!");
                };

                status.innerText = "✨ SELESAI! SILAKAN DOWNLOAD";
                dlArea.style.display = "block";
                goBtn.disabled = false;
                v1.pause(); v2.pause();
            };

            function draw() {
                if (recorder.state === "recording") {
                    // Gambar Video Utama (Layar Penuh)
                    ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                    // Gambar Video Reaksi (Kotak Kecil Kiri Bawah)
                    ctx.drawImage(v2, 40, canvas.height - 350, 220, 300);
                    requestAnimationFrame(draw);
                }
            }

            recorder.start();
            draw();
            // Rekam otomatis 15 detik untuk Shorts
            setTimeout(() => recorder.stop(), 15000);
        };
    </script>
</body>
</html>
