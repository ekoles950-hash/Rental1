<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Colab Otomatis</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        iframe { border-radius: 12px; border: 2px solid #333; width: 315px; height: 560px; }
        input { padding: 10px; width: 60%; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .label { margin-bottom: 5px; font-weight: bold; color: #aaa; }
    </style>
</head>
<body>

    <h2>Auto Preview Colab YouTube</h2>
    <p>Tempel link Shorts orang lain untuk melihat tampilan bersandingan</p>

    <input type="text" id="shortLink" placeholder="Tempel Link YouTube Shorts di sini...">
    <button onclick="updateColab()">Update Colab</button>

    <div class="container">
        <div>
            <div class="label">Video Kamu (Master)</div>
            <iframe id="myVideo" src="https://www.youtube.com/embed/VIDEO_ID_KAMU" frameborder="0" allowfullscreen></iframe>
        </div>

        <div>
            <div class="label">Video Target (Colab)</div>
            <iframe id="targetVideo" src="https://www.youtube.com/embed/" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function updateColab() {
            const link = document.getElementById('shortLink').value;
            const targetIframe = document.getElementById('targetVideo');
            
            // Logika ambil ID video dari link YouTube Shorts
            let videoId = "";
            if (link.includes("shorts/")) {
                videoId = link.split("shorts/")[1].split("?")[0];
            } else if (link.includes("v=")) {
                videoId = link.split("v=")[1].split("&")[0];
            }

            if (videoId) {
                targetIframe.src = "https://www.youtube.com/embed/" + videoId;
            } else {
                alert("Link tidak valid! Pastikan link YouTube Shorts benar.");
            }
        }
    </script>

</body>
</html>
