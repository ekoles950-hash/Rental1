<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Maker Pro</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .box { background: #111; padding: 25px; border-radius: 20px; border: 2px solid #00ff00; box-shadow: 0 0 15px #00ff00; max-width: 400px; margin: auto; }
        input, textarea { width: 100%; margin: 10px 0; background: #222; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; box-sizing: border-box; }
        button { background: #00ff00; color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:disabled { background: #444; color: #888; }
        #status { margin-top: 20px; color: #00ff00; font-weight: bold; }
        canvas, video { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h3>🎬 SENGKUNI AUTO UPLOAD</h3>
        
        <label style="font-size: 10px; display: block; text-align: left;">JUDUL VIDEO YOUTUBE:</label>
        <input type="text" id="v_title" placeholder="Contoh: Sengkuni Horeg Mantap">
        
        <input type="file" id="v1_in" accept="video/*">
        <p style="font-size: 10px; margin-top:-5px;">Video Utama (Patokan Durasi)</p>
        
        <input type="file" id="v2_in" accept="video/*">
        <p style="font-size: 10px; margin-top:-5px;">Video Reaksi (Mute)</p>
        
        <button id="gasBtn">GABUNG & KIRIM KE REPLIZ</button>
        <div id="status">Siap Mas Eko!</div>
    </div>

    <video id="v1" crossorigin="anonymous"></video>
    <video id="v2" loop muted crossorigin="anonymous"></video>
    <canvas id="c" width="720" height="1280"></canvas>

    <script>
        // KUNCI SAKTI REPLIZ MAS EKO
        const ACCESS_KEY = "4876222122";
        const SECRET_KEY = "ivylpP0kYeI20ooP9PJJ8H6iUumQJS7g";

        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const gasBtn = document.getElementById('gasBtn');
        const vTitle = document.getElementById('v_title');

        document.getElementById('v1_in').onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); };
        document.getElementById('v2_in').onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); };

        gasBtn.onclick = async () => {
            if (!v1.src || !v2.src) return alert("Pilih video dulu Mas!");
            if (!vTitle.value) return alert("Isi judul videonya dulu!");
            
            gasBtn.disabled = true;
            status.innerText = "⏳ SEDANG MEREKAM SESUAI DURASI...";

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(v1);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest); source.connect(audioCtx.destination);

            v1.currentTime = 0; v2.currentTime = 0;
            v1.play(); v2.play();
            
            const stream = new MediaStream([...canvas.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
            const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];

            rec.ondataavailable = (e) => chunks.push(e.data);
            v1.onended = () => { if(rec.state === "recording") rec.stop(); };

            rec.onstop = async () => {
                status.innerText = "🚀 MENGIRIM KE REPLIZ...";
                const blob = new Blob(chunks, { type: 'video/webm' });
                
                const formData = new FormData();
                formData.append('file', blob, 'video.webm');
                formData.append('title', vTitle.value); // Ambil judul dari input
                formData.append('description', 'Otomatis via Sengkuni Maker');

                try {
                    const response = await fetch('https://api.repliz.com/public/upload', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Basic ' + btoa(ACCESS_KEY + ':' + SECRET_KEY)
                        },
                        body: formData
                    });

                    if (response.ok) {
                        status.innerText = "✅ SUKSES! Sedang diproses di YouTube.";
                        alert("Berhasil! Video sedang diupload ke akun Pantelo.");
                    } else {
                        status.innerText = "❌ Gagal: Masalah koneksi API.";
                    }
                } catch (err) {
                    status.innerText = "❌ Error: Failed to fetch (Sinyal/CORS).";
                }
                gasBtn.disabled = false;
            };

            function draw() {
                if (rec.state === "recording") {
                    ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                    ctx.drawImage(v2, 40, canvas.height - 350, 220, 300);
                    requestAnimationFrame(draw);
                }
            }
            rec.start();
            draw();
        };
    </script>
</body>
</html>
