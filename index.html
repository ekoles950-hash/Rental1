<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Maker - Pro Theme</title>
    <style>
        /* TEMA DARK NEON KESUKAAN MAS EKO */
        :root { --neon: #00ff00; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --border: rgba(0, 255, 0, 0.3); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; background-image: radial-gradient(circle at top right, #002200, transparent); }
        
        .card { width: 100%; max-width: 450px; background: var(--glass); backdrop-filter: blur(15px); padding: 25px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.8); text-align: center; }
        
        h2 { color: var(--neon); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 15px var(--neon); margin-bottom: 25px; font-style: italic; }
        
        .input-group { margin-bottom: 15px; text-align: left; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        label { display: block; font-size: 10px; color: var(--neon); text-transform: uppercase; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        
        input[type="text"], select { width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; color: #fff; font-size: 14px; outline: none; }
        input[type="range"] { width: 100%; accent-color: var(--neon); cursor: pointer; }
        
        input[type="file"] { font-size: 11px; color: #888; }
        
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px; letter-spacing: 1px; }
        #gasBtn { background: var(--neon); color: #000; box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); }
        #gasBtn:active { transform: scale(0.98); }
        
        #status { margin-top: 20px; font-size: 12px; color: var(--neon); font-weight: bold; text-shadow: 0 0 5px #000; }
        
        #previewVideo, #thumbCanvas { width: 100%; border-radius: 15px; margin-top: 20px; border: 2px solid var(--neon); display: none; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        #dlThumb { background: #222; color: #fff; border: 1px solid #444; display: none; }
        
        canvas, .raw-video { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 SENGKUNI PRO</h2>
    
    <div class="input-group">
        <label>Mode Postingan</label>
        <select id="ratio" onchange="updateSize()">
            <option value="9:16">YouTube ke Shorts (9:16)</option>
            <option value="16:9">YouTube Tetap Long (16:9)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Momen Thumbnail: <span id="time_label" style="float:right;">5s</span></label>
        <input type="range" id="snap_time" min="1" max="60" value="5" oninput="updateTimeLabel(this.value)">
    </div>

    <div class="input-group">
        <label>Judul 1 (Kuning) & Posisi</label>
        <input type="text" id="v_title1" placeholder="Teks Atas..." oninput="updateThumbnail()">
        <input type="range" id="t1_pos" min="50" max="1200" value="200" oninput="updateThumbnail()">
    </div>

    <div class="input-group">
        <label>Judul 2 (Putih) & Posisi</label>
        <input type="text" id="v_title2" placeholder="Teks Bawah..." oninput="updateThumbnail()">
        <input type="range" id="t2_pos" min="50" max="1200" value="1100" oninput="updateThumbnail()">
    </div>

    <div class="grid">
        <div class="input-group"><label>Vidio Long</label><input type="file" id="v1_in" accept="video/*"></div>
        <div class="input-group"><label>Vidio Reaksi</label><input type="file" id="v2_in" accept="video/*"></div>
    </div>

    <button id="gasBtn">GAS GABUNG VIDEO</button>
    <div id="status">Ready Mas Eko! Temanya sudah sangar.</div>

    <video id="previewVideo" controls></video>
    <canvas id="thumbCanvas"></canvas>
    <button id="dlThumb">📥 DOWNLOAD THUMBNAIL</button>
</div>

<video id="v1" class="raw-video" crossorigin="anonymous" playsinline></video>
<video id="v2" class="raw-video" loop muted crossorigin="anonymous" playsinline></video>
<canvas id="c"></canvas>

<script>
    const v1 = document.getElementById('v1');
    const v2 = document.getElementById('v2');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const thumbCanvas = document.getElementById('thumbCanvas');
    const tCtx = thumbCanvas.getContext('2d');
    const status = document.getElementById('status');
    const gasBtn = document.getElementById('gasBtn');
    const dlBtn = document.getElementById('dlThumb');
    
    let capturedFrame = null;

    document.getElementById('v1_in').onchange = (e) => {
        v1.src = URL.createObjectURL(e.target.files[0]);
        v1.onloadedmetadata = () => { document.getElementById('snap_time').max = Math.floor(v1.duration); };
    };
    document.getElementById('v2_in').onchange = (e) => v2.src = URL.createObjectURL(e.target.files[0]);

    function updateTimeLabel(val) { document.getElementById('time_label').innerText = val + "s"; }

    function updateSize() {
        const mode = document.getElementById('ratio').value;
        thumbCanvas.width = (mode === "9:16") ? 720 : 1280;
        thumbCanvas.height = (mode === "9:16") ? 1280 : 720;
    }
    updateSize();

    gasBtn.onclick = async () => {
        if(!v1.src || !v2.src) return alert("Pilih video dulu Mas!");
        const mode = document.getElementById('ratio').value;
        canvas.width = (mode === "9:16") ? 720 : 1280;
        canvas.height = (mode === "9:16") ? 1280 : 720;
        
        gasBtn.disabled = true;
        status.innerText = "⏳ SEDANG MENGOLAH... SUARA DIJAMIN GLERRR!";

        const audioCtx = new AudioContext();
        const source = audioCtx.createMediaElementSource(v1);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest); source.connect(audioCtx.destination);

        const stream = new MediaStream([...canvas.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
        const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
        let chunks = [];

        v1.currentTime = 0; v1.play(); v2.play();
        rec.start();

        setTimeout(() => {
            capturedFrame = document.createElement('canvas');
            capturedFrame.width = canvas.width; capturedFrame.height = canvas.height;
            drawFrame(capturedFrame.getContext('2d'), canvas.width, canvas.height, mode);
            updateThumbnail();
            thumbCanvas.style.display = "block"; dlBtn.style.display = "block";
        }, document.getElementById('snap_time').value * 1000);

        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            document.getElementById('previewVideo').src = URL.createObjectURL(blob);
            document.getElementById('previewVideo').style.display = "block";
            status.innerText = "✅ SELESAI MAS EKO! HASILNYA MANTAP.";
            gasBtn.disabled = false;
        };

        v1.onended = () => rec.stop();

        function drawFrame(targetCtx, w, h, m) {
            if (m === "9:16") {
                const scale = h / v1.videoHeight;
                const newW = v1.videoWidth * scale;
                const offset = (newW - w) / 2;
                targetCtx.drawImage(v1, -offset, 0, newW, h);
                targetCtx.drawImage(v2, 40, h-350, 220, 300);
            } else {
                targetCtx.drawImage(v1, 0, 0, w, h);
                targetCtx.drawImage(v2, w-320, h-240, 280, 200);
            }
        }

        function draw() {
            if(rec.state === "recording") {
                drawFrame(ctx, canvas.width, canvas.height, mode);
                requestAnimationFrame(draw);
            }
        }
        draw();
    };

    function updateThumbnail() {
        if(!capturedFrame) return;
        tCtx.drawImage(capturedFrame, 0, 0, thumbCanvas.width, thumbCanvas.height);
        tCtx.font = "bold 85px Impact"; tCtx.textAlign = "center";
        tCtx.strokeStyle = "black"; tCtx.lineWidth = 12;
        const x = thumbCanvas.width / 2;
        const t1 = document.getElementById('v_title1').value.toUpperCase();
        const t2 = document.getElementById('v_title2').value.toUpperCase();
        if(t1) { tCtx.fillStyle = "#ffff00"; tCtx.strokeText(t1, x, document.getElementById('t1_pos').value); tCtx.fillText(t1, x, document.getElementById('t1_pos').value); }
        if(t2) { tCtx.fillStyle = "#ffffff"; tCtx.strokeText(t2, x, document.getElementById('t2_pos').value); tCtx.fillText(t2, x, document.getElementById('t2_pos').value); }
    }

    dlBtn.onclick = () => {
        const a = document.createElement('a');
        a.download = 'THUMBNAIL_SENGKUNI_PRO.jpg';
        a.href = thumbCanvas.toDataURL('image/jpeg', 0.95);
        a.click();
    };
</script>
</body>
</html>
