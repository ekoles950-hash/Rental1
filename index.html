<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Merger Instan - Mas Eko</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 10px; }
        .box { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        input { margin: 10px 0; width: 90%; }
        .preview-area { 
            display: flex; 
            justify-content: center; 
            background: #000; 
            width: 360px; /* Standar Shorts */
            height: 640px; 
            margin: 0 auto; 
            position: relative;
            overflow: hidden;
            border: 2px solid #ff0000;
        }
        video { width: 50%; height: 100%; object-fit: cover; }
        button { background: #ff0000; color: #fff; border: none; padding: 12px; border-radius: 8px; width: 90%; font-weight: bold; cursor: pointer; }
        #downloadBtn { background: #00ff00; color: #000; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h3>🚀 Auto Merge 2-in-1</h3>
    
    <div class="box">
        <label>1. Video Mas Eko:</label><br>
        <input type="file" id="vid1" accept="video/*"><br>
        <label>2. Video Target:</label><br>
        <input type="file" id="vid2" accept="video/*">
    </div>

    <div class="preview-area" id="captureArea">
        <video id="v1" autoplay loop muted></video>
        <video id="v2" autoplay loop muted></video>
    </div>

    <div style="margin-top: 15px;">
        <button id="startBtn">MULAI GABUNGKAN & REKAM</button>
        <button id="downloadBtn">DOWNLOAD HASIL VIDEO</button>
    </div>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const vid1Input = document.getElementById('vid1');
        const vid2Input = document.getElementById('vid2');
        const captureArea = document.getElementById('captureArea');
        const downloadBtn = document.getElementById('downloadBtn');

        // Preview Video saat dipilih
        vid1Input.onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); };
        vid2Input.onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); };

        let mediaRecorder;
        let recordedChunks = [];

        document.getElementById('startBtn').onclick = async function() {
            this.innerText = "SEDANG MEREKAM... (Tunggu 15 Detik)";
            this.style.background = "#555";
            
            const stream = captureArea.captureStream(30); // Ambil gambar dari tampilan web
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
            
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                downloadBtn.href = url;
                downloadBtn.download = "colab_mas_eko.webm";
                downloadBtn.style.display = "inline-block";
                this.innerText = "SELESAI! KLIK DOWNLOAD";
                this.style.background = "#ff0000";
            };

            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 15000); // Otomatis rekam 15 detik buat Shorts
        };
    </script>

</body>
</html>
