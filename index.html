<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Maker - Durasi Fix</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 15px; }
        .box { background: #111; padding: 20px; border-radius: 20px; border: 3px solid #00ff00; box-shadow: 0 0 15px #00ff00; max-width: 450px; margin: auto; }
        input, select, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #00ff00; color: #000; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #444; color: #888; }
        #status { margin-top: 15px; color: #00ff00; font-weight: bold; font-size: 13px; }
        #previewVideo { width: 100%; border-radius: 10px; margin-top: 15px; display: none; border: 2px solid #00ff00; }
        #downloadMaster { display: none; margin-top: 10px; color: #00ff00; font-weight: bold; text-decoration: underline; }
        canvas, .raw-video { display: none; }
        .label { font-size: 11px; color: #888; text-align: left; margin: 5px 0 0 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h3>🎬 SENGKUNI x REPLIZ PRO</h3>
        <input type="text" id="v_title" placeholder="Ketik Judul Postingan...">
        
        <input type="file" id="v1_in" accept="video/*">
        <div class="label">Video Utama (Suara & Durasi)</div>
        <input type="file" id="v2_in" accept="video/*">
        <div class="label">Video Reaksi (Bisu & Loop)</div>
        
        <button id="gasBtn">GABUNG & POST KE REPLIZ</button>
        <div id="status">Ready Mas Eko!</div>

        <video id="previewVideo" controls></video>
        <a id="downloadMaster" href="#">📥 DOWNLOAD MASTER.MP4</a>
    </div>

    <video id="v1" class="raw-video" crossorigin="anonymous" playsinline></video>
    <video id="v2" class="raw-video" loop muted crossorigin="anonymous" playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const URL_GAS = "https://script.google.com/macros/s/AKfycbyC_JLl-wwjrnT0xPdKrAW9xXyuCbLo4IcNxQWgy77xnBOpI-54qpOJ-J0w5pSUB4dL/exec";

        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const gasBtn = document.getElementById('gasBtn');
        const preview = document.getElementById('previewVideo');
        const dlLink = document.getElementById('downloadMaster');

        document.getElementById('v1_in').onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); };
        document.getElementById('v2_in').onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); };

        gasBtn.onclick = async () => {
            if(!v1.src || !v2.src) return alert("Pilih video dulu Mas!");
            
            canvas.width = 720; 
            canvas.height = 1280;
            gasBtn.disabled = true;
            status.innerText = "⏳ Sedang Proses (Ikut Durasi Utama)...";

            v1.currentTime = 0; v2.currentTime = 0;
            await v1.play(); v2.play();

            // Setup Audio dari Video Utama
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(v1);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest);
            source.connect(audioCtx.destination);

            const stream = new MediaStream([
                ...canvas.captureStream(30).getVideoTracks(),
                ...dest.stream.getAudioTracks()
            ]);

            const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];
            rec.ondataavailable = (e) => chunks.push(e.data);
            
            // KUNCI: Berhenti tepat saat video utama habis
            v1.onended = () => {
                if(rec.state === "recording") rec.stop();
            };

            rec.onstop = async () => {
                const finalBlob = new Blob(chunks, { type: 'video/mp4' });
                const videoUrl = URL.createObjectURL(finalBlob);

                preview.src = videoUrl;
                preview.style.display = "block";
                dlLink.href = videoUrl;
                dlLink.download = "master.mp4";
                dlLink.style.display = "block";

                status.innerText = "🚀 Mengirim ke Repliz...";

                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    const formData = new URLSearchParams();
                    formData.append('file', base64);
                    formData.append('title', document.getElementById('v_title').value);
                    
                    let d = new Date();
                    d.setUTCHours(5, 0, 0, 0); 
                    formData.append('scheduleAt', d.toISOString());

                    try {
                        const res = await fetch(URL_GAS, { method: 'POST', body: formData });
                        status.innerText = "✅ " + await res.text();
                    } catch (e) {
                        status.innerText = "❌ Gagal Kirim.";
                    }
                    gasBtn.disabled = false;
                };
                reader.readAsDataURL(finalBlob);
            };

            rec.start();
            function draw() {
                if(rec.state === "recording"){
                    ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                    ctx.drawImage(v2, 40, 900, 220, 300);
                    requestAnimationFrame(draw);
                }
            }
            draw();
        };
    </script>
</body>
</html>
