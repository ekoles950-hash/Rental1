<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Instan - No FFmpeg</title>
    <style>
        :root { --neon: #00ff00; --bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 450px; background: var(--glass); backdrop-filter: blur(15px); padding: 20px; border-radius: 24px; border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0,255,0,0.2); text-align: center; }
        h2 { color: var(--neon); text-transform: uppercase; text-shadow: 0 0 10px var(--neon); }
        .input-group { margin-bottom: 10px; text-align: left; }
        label { display: block; font-size: 10px; color: var(--neon); font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; background: #000; border: 1px solid #333; padding: 10px; border-radius: 10px; color: #fff; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; background: var(--neon); color: #000; cursor: pointer; margin-top: 10px; }
        #status { margin-top: 15px; font-size: 12px; color: #ff0000; font-weight: bold; }
        #thumbCanvas, #previewVideo { width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid var(--neon); display: none; }
        canvas, .hidden-v { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 SENGKUNI INSTAN</h2>

    <div class="input-group">
        <label>Teks Atas & Posisi</label>
        <input type="text" id="t1" placeholder="Judul Atas..." oninput="drawThumb()">
        <input type="range" id="t1p" min="50" max="1200" value="150" oninput="drawThumb()">
    </div>

    <div class="input-group">
        <label>Teks Bawah & Posisi</label>
        <input type="text" id="t2" placeholder="Judul Bawah..." oninput="drawThumb()">
        <input type="range" id="t2p" min="50" max="1150" value="1050" oninput="drawThumb()">
    </div>

    <div class="input-group">
        <label>Detik Jepretan: <span id="time_val">5s</span></label>
        <input type="range" id="stime" min="1" max="60" value="5" oninput="document.getElementById('time_val').innerText=this.value+'s'">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group"><label>Horeg</label><input type="file" id="v1i" accept="video/*"></div>
        <div class="input-group"><label>Reaksi</label><input type="file" id="v2i" accept="video/*"></div>
    </div>

    <button id="go">GABUNG & JEPRET SEKARANG</button>
    <div id="status">Ready Mas Eko! Gak Pake Lama.</div>

    <video id="previewVideo" controls></video>
    <canvas id="thumbCanvas"></canvas>
    <button id="dl" style="display:none; background:#333; color:#fff;">📥 DOWNLOAD THUMBNAIL</button>
</div>

<video id="v1" class="hidden-v"></video>
<video id="v2" class="hidden-v" loop muted></video>
<canvas id="c_hidden"></canvas>

<script>
    const v1 = document.getElementById('v1');
    const v2 = document.getElementById('v2');
    const c = document.getElementById('c_hidden');
    const ctx = c.getContext('2d');
    const tc = document.getElementById('thumbCanvas');
    const tctx = tc.getContext('2d');
    const status = document.getElementById('status');
    let frame = null;

    document.getElementById('v1i').onchange = (e) => {
        v1.src = URL.createObjectURL(e.target.files[0]);
        v1.onloadedmetadata = () => document.getElementById('stime').max = Math.floor(v1.duration);
    };
    document.getElementById('v2i').onchange = (e) => v2.src = URL.createObjectURL(e.target.files[0]);

    function drawThumb() {
        if(!frame) return;
        tctx.drawImage(frame, 0, 0, tc.width, tc.height);
        tctx.textAlign = "center"; tctx.strokeStyle = "black"; tctx.lineWidth = 10; tctx.font = "bold 80px Impact";
        const tx1 = document.getElementById('t1').value.toUpperCase();
        const tx2 = document.getElementById('t2').value.toUpperCase();
        if(tx1) { tctx.fillStyle = "#ffff00"; tctx.strokeText(tx1, tc.width/2, document.getElementById('t1p').value); tctx.fillText(tx1, tc.width/2, document.getElementById('t1p').value); }
        if(tx2) { tctx.fillStyle = "#fff"; tctx.strokeText(tx2, tc.width/2, document.getElementById('t2p').value); tctx.fillText(tx2, tc.width/2, document.getElementById('t2p').value); }
    }

    document.getElementById('go').onclick = async () => {
        if(!v1.src || !v2.src) return alert("Pilih video dulu Mas!");
        status.innerText = "🚀 PROSES JALAN (SUARA AMAN)...";
        
        tc.width = 1280; tc.height = 720;
        c.width = 1280; c.height = 720;

        // Jepret Thumbnail
        v1.currentTime = document.getElementById('stime').value;
        v1.onseeked = () => {
            frame = document.createElement('canvas');
            frame.width = 1280; frame.height = 720;
            frame.getContext('2d').drawImage(v1, 0, 0, 1280, 720);
            drawThumb();
            tc.style.display = "block";
            document.getElementById('dl').style.display = "block";
        };

        // Mulai Gabung (Metode Cepat)
        v1.currentTime = 0; v1.play(); v2.play();
        const stream = c.captureStream(30);
        const audioCtx = new AudioContext();
        const source = audioCtx.createMediaElementSource(v1);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest); source.connect(audioCtx.destination);
        
        const fullStream = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        const rec = new MediaRecorder(fullStream, { mimeType: 'video/webm' });
        let chunks = [];
        
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            document.getElementById('previewVideo').src = URL.createObjectURL(new Blob(chunks, {type:'video/mp4'}));
            document.getElementById('previewVideo').style.display = "block";
            status.innerText = "✅ SELESAI MAS EKO!";
        };

        rec.start();
        v1.onended = () => rec.stop();

        function render() {
            if(v1.paused || v1.ended) return;
            ctx.drawImage(v1, 0, 0, 1280, 720);
            ctx.drawImage(v2, 1280-320, 720-240, 280, 200);
            requestAnimationFrame(render);
        }
        render();
    };

    document.getElementById('dl').onclick = () => {
        const a = document.createElement('a');
        a.href = tc.toDataURL('image/jpeg');
        a.download = 'SENGKUNI_THUMB.jpg';
        a.click();
    };
</script>
</body>
</html>
