<div class="box">
    <h3>🎬 SENGKUNI MULTI-AI</h3>
    <input type="text" id="v_title" placeholder="Judul & Prompt Thumbnail...">

    <div class="label">Pilih Mesin AI:</div>
    <select id="api_provider">
        <option value="gemini">Google AI Studio (Gemini 2.0)</option>
        <option value="maia">Maia Router (GPT-5.1 Codex)</option>
    </select>
    <input type="password" id="api_key" placeholder="Masukkan API KEY Mas di sini...">

    <div class="label">Ukuran Video:</div>
    <select id="ratio">
        <option value="9:16">Shorts (9:16)</option>
        <option value="16:9">YouTube (16:9)</option>
    </select>

    <input type="file" id="v1_in" accept="video/*">
    <input type="file" id="v2_in" accept="video/*">

    <button id="gasBtn">GABUNG & BUAT THUMBNAIL AI</button>
    <div id="status">Ready Mas Eko!</div>

    <div id="ai_area" style="display:none; margin-top:20px;">
        <img id="thumbPreview" style="width:100%; border-radius:10px; border:2px solid #00ff00;">
        <button id="uploadBtn" style="background:#ff0000; color:#fff; margin-top:15px;">UPLOAD KE YOUTUBE</button>
    </div>
</div>

<script>
    // Fungsi panggil AI yang fleksibel
    async function panggilAI(base64Image) {
        const provider = document.getElementById('api_provider').value;
        const key = document.getElementById('api_key').value;
        const judul = document.getElementById('v_title').value;

        if(!key) return alert("API KEY Kosong Mas!");

        status.innerText = `🤖 Menghubungi ${provider.toUpperCase()}...`;

        try {
            if (provider === "gemini") {
                // --- JALUR GOOGLE AI STUDIO (GEMINI) ---
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: `Berdasarkan gambar referensi ini, buatkan prompt detail untuk thumbnail YouTube dengan judul: ${judul}` },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }
                            ]
                        }]
                    })
                });
                const data = await res.json();
                // Catatan: Gemini biasanya teks, jika Mas mau Gemini bikin gambar, 
                // pastikan pakai model Imagen di AI Studio.
                console.log(data);
                status.innerText = "✅ Prompt AI Gemini Berhasil!";
                
            } else if (provider === "maia") {
                // --- JALUR MAIA ROUTER ---
                const res = await fetch('https://api.maiarouter.ai/v1/images/generations', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "openai/gpt-5.1-codex-mini",
                        prompt: `High quality YouTube thumbnail for: ${judul}`,
                        image_reference: base64Image,
                        size: "1280x720"
                    })
                });
                const data = await res.json();
                if(data.data) {
                    document.getElementById('thumbPreview').src = data.data[0].url;
                    document.getElementById('ai_area').style.display = "block";
                    status.innerText = "✅ Thumbnail MAIA Siap!";
                }
            }
        } catch (e) {
            status.innerText = "❌ Gagal panggil API.";
        }
    }
    
    // (Fungsi draw, recording, dll tetap sama seperti versi sebelumnya)
</script>
