<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Mute - Mas Eko</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 15px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input { margin: 10px 0; width: 100%; color: white; }
        button { background: #ff0000; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        #status { margin-top: 15px; color: #ffcc00; font-size: 14px; font-weight: bold; }
        #downloadArea { display: none; margin-top: 20px; padding: 20px; border-top: 2px solid #333; }
        .btn-download { background: #00ff00; color: #000; text-decoration: none; padding: 20px; display: block; border-radius: 12px; font-weight: bold; font-size: 18px; }
        canvas, video { display: none; }
    </style>
</head>
<body>

    <h3>🎥 Reaction Maker (Suara Utama)</h3>
    <p style="font-size: 11px; color: #aaa;">Video reaksi akan dibisukan agar suara tidak kacau.</p>

    <div class="card">
        <label>1. Video Utama (Ada Suara):</label>
        <input type="file" id="vid1" accept="video/*">
        
        <label>2. Video Reaksi Mas Eko (Mute):</label>
        <input type="file" id="vid2" accept="video/*">
        
        <button id="goBtn">GABUNG & PROSES</button>
        <div id="status">Siap, Mas Eko!</div>
    </div>

    <div id="downloadArea">
        <p>✅ BERHASIL! Klik tombol di bawah:</p>
        <a id="linkDownload" class="btn-download">SIMPAN VIDEO KE GALERI</a>
    </div>

    <video id="v1" loop crossorigin="anonymous"></video>
    <video id="v2" loop muted crossorigin="anonymous"></video>
    <canvas id="c" width="720" height="1280"></canvas>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const goBtn = document.getElementById('goBtn');
        const status = document.getElementById('status');
        const dlArea = document.getElementById('downloadArea');
        const dlLink = document.getElementById('linkDownload');

        document.getElementById('vid1').onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); };
        document.getElementById('vid2').onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); };

        goBtn.onclick = async () => {
            if (!v1.src || !v2.src) return alert("Pilih videonya dulu!");
            
            status.innerText = "🚀 SEDANG MEMPROSES... TUNGGU 15 DETIK";
            goBtn.disabled = true;
            dlArea.style.display = "none";

            // Putar kedua video
            v1.play();
            v2.play();

            // AMBIL SUARA HANYA DARI VIDEO UTAMA (v1)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();
            const source1 = audioCtx.createMediaElementSource(v1);
            source1.connect(dest);
            source1.connect(audioCtx.destination); 

            const videoStream = canvas.captureStream(30);
            const combinedStream = new MediaStream([
                ...videoStream.getVideoTracks(),
                ...dest.stream.getAudioTracks()
            ]);

            const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
            let chunks = [];

            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                dlLink.href = url;
                dlLink.download = "reaksi_jernih_eko.webm";
                
                status.innerText = "✨ SELESAI! SUARA JOSS";
                dlArea.style.display = "block";
                goBtn.disabled = false;
                v1.pause(); v2.pause();
            };

            function draw() {
                if (recorder.state === "recording") {
                    ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                    // Overlay video reaksi Mas Eko di kiri bawah
                    ctx.drawImage(v2, 40, canvas.height - 350, 220, 300);
                    requestAnimationFrame(draw);
                }
            }

            recorder.start();
            draw();
            setTimeout(() => recorder.stop(), 15000);
        };
    </script>
</body>
</html>
