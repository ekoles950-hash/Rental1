<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Maker - Sesuai Durasi</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 15px; }
        .box { background: #111; padding: 25px; border-radius: 20px; border: 2px solid #ff0000; }
        button { background: #ff0000; color: #fff; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        #status { margin-top: 15px; color: #ffcc00; font-weight: bold; }
        canvas, video { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="color:#ff0000;">SENGKUNI HOREG</h2>
        <p style="font-size: 12px; color: #888;">DURASI OTOMATIS SESUAI VIDEO UTAMA</p>
        
        <input type="file" id="v1_in" accept="video/*" style="width:100%; margin-bottom:10px;">
        <p style="font-size: 10px;">Video Utama (Patokan Durasi)</p>
        
        <input type="file" id="v2_in" accept="video/*" style="width:100%;">
        <p style="font-size: 10px;">Video Reaksi (Mute)</p>
        
        <button id="gas">GABUNG & SIMPAN</button>
        <div id="status">Pilih video dulu Mas Eko...</div>
    </div>

    <video id="v1" crossorigin="anonymous"></video>
    <video id="v2" loop muted crossorigin="anonymous"></video>
    <canvas id="c" width="720" height="1280"></canvas>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const gas = document.getElementById('gas');
        const status = document.getElementById('status');

        document.getElementById('v1_in').onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); };
        document.getElementById('v2_in').onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); };

        gas.onclick = () => {
            if (!v1.src || !v2.src) return alert("Pilih kedua videonya dulu!");
            
            gas.disabled = true;
            status.innerText = "⏳ SEDANG MEREKAM SESUAI DURASI VIDEO...";

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(v1);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest); source.connect(audioCtx.destination);

            v1.currentTime = 0; v2.currentTime = 0;
            v1.play(); v2.play();
            
            const stream = new MediaStream([
                ...canvas.captureStream(30).getVideoTracks(), 
                ...dest.stream.getAudioTracks()
            ]);

            const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];

            rec.ondataavailable = (e) => chunks.push(e.data);
            rec.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Sengkuni_Horeg_" + Date.now() + ".webm";
                a.click();
                
                status.innerText = "✅ BERHASIL! CEK DOWNLOAD.";
                gas.disabled = false;
                v1.pause(); v2.pause();
            };

            // LOGIKA OTOMATIS: Berhenti saat video 1 (utama) habis
            v1.onended = () => {
                if(rec.state === "recording") rec.stop();
            };

            function draw() {
                if (rec.state === "recording") {
                    ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                    ctx.drawImage(v2, 40, canvas.height - 350, 220, 300);
                    requestAnimationFrame(draw);
                }
            }

            rec.start();
            draw();
        };
    </script>
</body>
</html>
