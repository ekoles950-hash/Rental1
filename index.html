<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Maker - Anti Blokir</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 15px; }
        .box { background: #111; padding: 20px; border-radius: 20px; border: 2px solid #00ff00; box-shadow: 0 0 15px #00ff00; }
        input, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #00ff00; color: #000; font-weight: bold; cursor: pointer; }
        #log { background: #000; color: #00ff00; text-align: left; font-size: 10px; height: 120px; overflow-y: scroll; padding: 10px; border: 1px solid #444; margin-top: 10px; font-family: monospace; }
        canvas, video { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h3>🎬 SENGKUNI ANTI-BLOKIR</h3>
        <input type="text" id="v_title" placeholder="Judul Youtube...">
        <input type="file" id="v1_in" accept="video/*">
        <p style="font-size: 10px; color: #888;">Video Utama (Durasi Patokan)</p>
        <input type="file" id="v2_in" accept="video/*">
        <p style="font-size: 10px; color: #888;">Video Reaksi (Mute)</p>
        <button id="gasBtn">GABUNG & KIRIM YT</button>
        <div id="log">Console: Menunggu perintah Mas Eko...</div>
    </div>

    <video id="v1" crossorigin="anonymous" playsinline></video>
    <video id="v2" loop muted crossorigin="anonymous" playsinline></video>
    <canvas id="c" width="720" height="1280"></canvas>

    <script>
        const logBox = document.getElementById('log');
        function cetakLog(msg) { 
            logBox.innerHTML += "<br>> " + msg; 
            logBox.scrollTop = logBox.scrollHeight;
        }

        // KUNCI SAKTI MAS EKO
        const ACCESS_KEY = "4876222122";
        const SECRET_KEY = "ivylpP0kYeI20ooP9PJJ8H6iUumQJS7g";
        const TARGET_URL = "https://api.repliz.com/public/upload";
        // PIPA TEMBUS (PROXY)
        const PROXY_URL = "https://corsproxy.io/?";

        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        document.getElementById('v1_in').onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); cetakLog("Video 1 Ready"); };
        document.getElementById('v2_in').onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); cetakLog("Video 2 Ready"); };

        document.getElementById('gasBtn').onclick = async () => {
            if (!v1.src || !v2.src) return alert("Pilih video dulu!");
            cetakLog("Memulai Rekaman Durasi...");
            
            v1.currentTime = 0; v2.currentTime = 0;
            await v1.play(); v2.play();

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(v1);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest); source.connect(audioCtx.destination);

            const stream = new MediaStream([...canvas.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
            const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];

            rec.ondataavailable = (e) => chunks.push(e.data);
            v1.onended = () => { cetakLog("Video Utama Habis. Berhenti."); rec.stop(); };

            rec.onstop = async () => {
                cetakLog("Proses Pengiriman via Pipa Proxy...");
                const blob = new Blob(chunks, { type: 'video/webm' });
                const formData = new FormData();
                formData.append('file', blob, 'video_horeg.webm');
                formData.append('title', document.getElementById('v_title').value || "Sengkuni Horeg");

                try {
                    // MENGGUNAKAN PROXY UNTUK MENEMBUS BLOKIR
                    const res = await fetch(PROXY_URL + encodeURIComponent(TARGET_URL), {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Basic ' + btoa(ACCESS_KEY + ':' + SECRET_KEY)
                        },
                        body: formData
                    });

                    if (res.ok) {
                        cetakLog("✅ BERHASIL TEMBUS KE REPLIZ!");
                        alert("MANTAP MAS EKO! Cek Channel Pantelo.");
                    } else {
                        cetakLog("❌ GAGAL: Kode " + res.status);
                    }
                } catch (e) {
                    cetakLog("❌ ERROR PROXY: " + e.message);
                }
            };

            rec.start();
            function draw() {
                if (rec.state === "recording") {
                    ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                    ctx.drawImage(v2, 40, canvas.height - 350, 220, 300);
                    requestAnimationFrame(draw);
                }
            }
            draw();
        };
    </script>
</body>
</html>
