<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Sat-Set</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --neon: #00ff00; --bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; display: flex; justify-content: center; background-image: radial-gradient(circle at top right, #003300, transparent); }
        .card { width: 100%; max-width: 450px; background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 24px; border: 1px solid rgba(0, 255, 0, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: var(--neon); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 0, 0.5); margin-bottom: 20px; }
        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 10px; color: var(--neon); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #333; padding: 12px; border-radius: 12px; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px; background: var(--neon); color: #000; box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        #status { margin-top: 15px; font-size: 12px; color: var(--neon); font-weight: bold; }
        #previewVideo { width: 100%; border-radius: 14px; margin-top: 15px; display: none; border: 2px solid var(--neon); }
        .progress-bar { width: 100%; background: #333; height: 10px; border-radius: 5px; margin-top: 10px; display: none; overflow: hidden; }
        .progress-inner { width: 0%; height: 100%; background: var(--neon); transition: 0.1s; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 SENGKUNI SAT-SET</h2>
    
    <div class="input-group">
        <label>Ukuran Video</label>
        <select id="ratio">
            <option value="shorts">Shorts (9:16)</option>
            <option value="youtube">YouTube (16:9)</option>
        </select>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group"><label>Vidio Horeg</label><input type="file" id="v1_in" accept="video/*"></div>
        <div class="input-group"><label>Vidio Reaksi</label><input type="file" id="v2_in" accept="video/*"></div>
    </div>

    <button id="gasBtn">PROSES GABUNG (CEPAT)</button>
    
    <div class="progress-bar" id="p_bar"><div class="progress-inner" id="p_inner"></div></div>
    <div id="status">Ready Mas Eko! Tanpa Nunggu Lama.</div>

    <video id="previewVideo" controls></video>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });
    const status = document.getElementById('status');
    const gasBtn = document.getElementById('gasBtn');
    const pBar = document.getElementById('p_bar');
    const pInner = document.getElementById('p_inner');

    gasBtn.onclick = async () => {
        const v1 = document.getElementById('v1_in').files[0];
        const v2 = document.getElementById('v2_in').files[0];
        const mode = document.getElementById('ratio').value;

        if (!v1 || !v2) return alert("Pilih kedua video dulu Mas!");

        gasBtn.disabled = true;
        pBar.style.display = "block";
        status.innerText = "⏳ Menyiapkan Mesin...";

        if (!ffmpeg.isLoaded()) await ffmpeg.load();

        status.innerText = "⚡ Sedang Mengolah Video (Sat-set)...";

        // Tulis file ke memori FFmpeg
        ffmpeg.FS('writeFile', 'horeg.mp4', await fetchFile(v1));
        ffmpeg.FS('writeFile', 'reaksi.mp4', await fetchFile(v2));

        // Command FFmpeg: Gabung video + Ambil audio murni dari Horeg
        // v2 (reaksi) dikecilkan dan ditaruh di pojok
        let filter = "";
        if(mode === "shorts") {
            filter = "[1:v]scale=220:-1[vid2];[0:v][vid2]overlay=40:h-350[outv]";
        } else {
            filter = "[1:v]scale=280:-1[vid2];[0:v][vid2]overlay=main_w-320:main_h-240[outv]";
        }

        // Jalankan perintah: -shortest agar durasi ikut video paling pendek (Horeg)
        // -map 0:a gunanya mengambil audio MURNI dari video 1 saja
        await ffmpeg.run(
            '-i', 'horeg.mp4', 
            '-i', 'reaksi.mp4', 
            '-filter_complex', filter, 
            '-map', '[outv]', 
            '-map', '0:a', 
            '-c:v', 'libx264', 
            '-preset', 'ultrafast', 
            '-crf', '28', 
            '-c:a', 'copy', 
            '-shortest', 
            'output.mp4'
        );

        status.innerText = "✅ SELESAI MAS EKO!";
        const data = ffmpeg.FS('readFile', 'output.mp4');
        const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
        
        const preview = document.getElementById('previewVideo');
        preview.src = URL.createObjectURL(videoBlob);
        preview.style.display = "block";
        gasBtn.disabled = false;
        pBar.style.display = "none";
    };

    // Update Progress
    ffmpeg.setProgress(({ ratio }) => {
        pInner.style.width = (ratio * 100) + "%";
    });
</script>
</body>
</html>
