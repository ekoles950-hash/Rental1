<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Merger 2-in-1 - Mas Eko</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input { margin: 10px 0; display: block; width: 100%; }
        button { background: #ff0000; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        #status { margin-top: 15px; color: #ffcc00; font-size: 14px; }
        video { width: 100%; max-width: 400px; margin-top: 20px; border-radius: 10px; border: 2px solid #444; }
    </style>
</head>
<body>

    <h2>🚀 Video Merger 2-in-1</h2>
    <p>Pilih 2 file video dari galeri untuk digabung kiri-kanan</p>

    <div class="box">
        <label>Video Kiri (Mas Eko):</label>
        <input type="file" id="video1" accept="video/*">
        
        <label>Video Kanan (Target):</label>
        <input type="file" id="video2" accept="video/*">
        
        <button id="mergeBtn">GABUNGKAN SEKARANG</button>
        <div id="status">Siap memproses...</div>
    </div>

    <div id="resultArea" style="display:none;">
        <h3>Hasil Gabungan:</h3>
        <video id="outputVideo" controls></video>
        <br>
        <a id="downloadLink" style="color: #00ff00; text-decoration: none; font-weight: bold;">[ KLIK DISINI UNTUK DOWNLOAD ]</a>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        const mergeBtn = document.getElementById('mergeBtn');
        const status = document.getElementById('status');

        mergeBtn.addEventListener('click', async () => {
            const file1 = document.getElementById('video1').files[0];
            const file2 = document.getElementById('video2').files[0];

            if (!file1 || !file2) {
                alert("Pilih kedua videonya dulu ya Mas Eko!");
                return;
            }

            status.innerText = "Sedang memuat sistem (tunggu sebentar)...";
            if (!ffmpeg.isLoaded()) await ffmpeg.load();

            status.innerText = "Sedang menggabungkan video... (Jangan tutup web ini)";
            
            ffmpeg.FS('writeFile', 'input1.mp4', await fetchFile(file1));
            ffmpeg.FS('writeFile', 'input2.mp4', await fetchFile(file2));

            // Perintah untuk menggabungkan video secara side-by-side
            await ffmpeg.run('-i', 'input1.mp4', '-i', 'input2.mp4', '-filter_complex', 'hstack', 'output.mp4');

            const data = ffmpeg.FS('readFile', 'output.mp4');
            const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(videoBlob);

            document.getElementById('outputVideo').src = url;
            document.getElementById('downloadLink').href = url;
            document.getElementById('downloadLink').download = 'colab_mas_eko.mp4';
            document.getElementById('resultArea').style.display = 'block';
            status.innerText = "Selesai! Video sudah jadi 1 file.";
        });
    </script>

</body>
</html>
