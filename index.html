<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Maker Pro + AI Thumbnail</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 15px; }
        .box { background: #111; padding: 20px; border-radius: 20px; border: 3px solid #00ff00; box-shadow: 0 0 15px #00ff00; max-width: 450px; margin: auto; }
        input, select, button, textarea { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #00ff00; color: #000; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; color: #00ff00; font-weight: bold; font-size: 13px; }
        #thumbPreview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 2px dashed #00ff00; }
        .label { font-size: 11px; color: #888; text-align: left; margin: 5px 0 0 5px; }
        canvas, .raw-video { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h3>🎬 SENGKUNI AI GENERATOR</h3>
    
    <input type="text" id="v_title" placeholder="Judul Video & Prompt Foto AI...">
    
    <div class="label">Pilih Ukuran:</div>
    <select id="ratio">
        <option value="9:16">Shorts (9:16)</option>
        <option value="16:9">YouTube (16:9)</option>
    </select>

    <input type="file" id="v1_in" accept="video/*">
    <div class="label">Video Utama</div>
    <input type="file" id="v2_in" accept="video/*">
    <div class="label">Video Reaksi</div>

    <button id="gasBtn">1. GABUNG & AMBIL REFERENSI AI</button>
    
    <div id="ai_area" style="display:none;">
        <div class="label" style="color:#00ff00;">🔥 HASIL THUMBNAIL AI:</div>
        <img id="thumbPreview" src="" alt="Thumbnail AI">
        <button id="uploadBtn" style="background:#ff0000; color:#fff;">2. UPLOAD VIDEO + THUMBNAIL</button>
    </div>

    <div id="status">Ready Mas Eko!</div>
</div>

<video id="v1" class="raw-video" crossorigin="anonymous" playsinline></video>
<video id="v2" class="raw-video" loop muted crossorigin="anonymous" playsinline></video>
<canvas id="c"></canvas>

<script>
    // --- SETTING API KEY MAIA ROUTER MAS EKO ---
    const MAIA_API_KEY = "MASUKKAN_API_KEY_DARI_SCREENSHOT_MAS"; 
    const CLIENT_ID = "MASUKKAN_CLIENT_ID_GOOGLE_MAS";
    
    let finalBlob = null;
    let screenshotBase64 = null;

    const v1 = document.getElementById('v1');
    const v2 = document.getElementById('v2');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    document.getElementById('v1_in').onchange = (e) => v1.src = URL.createObjectURL(e.target.files[0]);
    document.getElementById('v2_in').onchange = (e) => v2.src = URL.createObjectURL(e.target.files[0]);

    // 1. GABUNG VIDEO & AMBIL SCREENSHOT
    document.getElementById('gasBtn').onclick = async () => {
        const mode = document.getElementById('ratio').value;
        canvas.width = (mode === "9:16") ? 720 : 1280;
        canvas.height = (mode === "9:16") ? 1280 : 720;
        
        status.innerText = "⏳ Gabung & Mencari Momen Terbaik untuk AI...";
        v1.currentTime = 0; v2.currentTime = 0;
        await v1.play(); v2.play();

        const stream = canvas.captureStream(30);
        const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
        let chunks = [];
        
        // Ambil screenshot di detik ke-2 (saat video sudah jalan)
        setTimeout(() => {
            screenshotBase64 = canvas.toDataURL('image/jpeg', 0.8);
            console.log("📸 Screenshot Referensi Berhasil Diambil");
        }, 2000);

        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = async () => {
            finalBlob = new Blob(chunks, { type: 'video/mp4' });
            status.innerText = "🤖 Sedang Membuat Thumbnail AI di MAIA Router...";
            buatThumbnailAI();
        };

        v1.onended = () => rec.stop();
        rec.start();

        function draw() {
            if(rec.state === "recording") {
                ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                ctx.drawImage(v2, 40, canvas.height - 350, 220, 300);
                requestAnimationFrame(draw);
            }
        }
        draw();
    };

    // 2. FUNGSI MANGGIL MAIA ROUTER (GPT-5.1-CODEX-MINI)
    async function buatThumbnailAI() {
        const judul = document.getElementById('v_title').value;
        
        try {
            const response = await fetch('https://api.maiarouter.ai/v1/images/generations', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${MAIA_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "openai/gpt-5.1-codex-mini",
                    prompt: `Buatkan YouTube Thumbnail sedetail mungkin. Judul: ${judul}. Referensi visual: Gunakan gaya pencahayaan sinematik, teks 3D yang mencolok, dan suasana horeg yang megah.`,
                    image_reference: screenshotBase64, // Mengirim screenshot sebagai referensi
                    n: 1,
                    size: "1280x720"
                })
            });

            const data = await response.json();
            if(data.data && data.data[0].url) {
                document.getElementById('thumbPreview').src = data.data[0].url;
                document.getElementById('thumbPreview').style.display = "block";
                document.getElementById('ai_area').style.display = "block";
                status.innerText = "✅ Video & Thumbnail AI Siap!";
            } else {
                status.innerText = "❌ AI Gagal: " + JSON.stringify(data);
            }
        } catch (e) {
            status.innerText = "❌ Gagal Konek ke MAIA Router.";
        }
    }
</script>
</body>
</html>
