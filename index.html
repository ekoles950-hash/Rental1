<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Pro - Smart Zoom</title>
    <style>
        :root { --neon: #00ff00; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; background-image: radial-gradient(circle at top right, #002200, transparent); }
        .card { width: 100%; max-width: 450px; background: var(--glass); backdrop-filter: blur(15px); padding: 25px; border-radius: 30px; border: 1px solid rgba(0,255,0,0.3); text-align: center; box-shadow: 0 10px 30px #000; }
        h2 { color: var(--neon); text-transform: uppercase; text-shadow: 0 0 15px var(--neon); margin-bottom: 20px; font-style: italic; }
        .input-group { margin-bottom: 12px; text-align: left; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; }
        label { display: block; font-size: 10px; color: var(--neon); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; background: #000; border: 1px solid #222; padding: 10px; border-radius: 10px; color: #fff; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px; background: var(--neon); color: #000; }
        #status { margin-top: 15px; font-size: 12px; color: var(--neon); font-weight: bold; }
        .part-list { margin-top: 20px; display: grid; gap: 10px; }
        .part-btn { background: #222; color: #fff; border: 1px solid var(--neon); padding: 10px; border-radius: 8px; text-decoration: none; font-size: 12px; display: none; text-align: center; }
        canvas, .raw-v { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 SENGKUNI SMART ZOOM</h2>

    <div class="input-group">
        <label>Geser Kamera (Kiri <-> Kanan)</label>
        <input type="range" id="zoom_pos" min="0" max="100" value="50">
        <div style="display:flex; justify-content:space-between; font-size:8px; color:#888; margin-top:5px;">
            <span>KIRI</span><span>TENGAH</span><span>KANAN</span>
        </div>
    </div>

    <div class="input-group">
        <label>Judul & Posisi</label>
        <input type="text" id="t1" placeholder="Judul Atas..." oninput="drawThumb()">
        <input type="range" id="t1p" min="50" max="1200" value="200" oninput="drawThumb()">
    </div>

    <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group"><label>Vidio Long</label><input type="file" id="v1i" accept="video/*"></div>
        <div class="input-group"><label>Vidio Reaksi</label><input type="file" id="v2i" accept="video/*"></div>
    </div>

    <button id="gasBtn">GAS POTONG PART (60s)</button>
    <div id="status">Ready Mas Eko! Atur kamera dulu ya.</div>

    <div class="part-list" id="downloadArea">
        <label id="listLabel" style="display:none; color:var(--neon)">UNDUH PART (MANUAL):</label>
    </div>

    <canvas id="thumbCanvas" style="width:100%; border-radius:15px; margin-top:15px; display:none; border:2px solid var(--neon)"></canvas>
</div>

<video id="v1" class="raw-v"></video>
<video id="v2" class="raw-v" loop muted></video>
<canvas id="c"></canvas>

<script>
    const v1 = document.getElementById('v1');
    const v2 = document.getElementById('v2');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const tc = document.getElementById('thumbCanvas');
    const tctx = tc.getContext('2d');
    const status = document.getElementById('status');
    const gasBtn = document.getElementById('gasBtn');
    const dlArea = document.getElementById('downloadArea');
    const zoomPos = document.getElementById('zoom_pos');

    let frame = null;

    document.getElementById('v1i').onchange = (e) => v1.src = URL.createObjectURL(e.target.files[0]);
    document.getElementById('v2i').onchange = (e) => v2.src = URL.createObjectURL(e.target.files[0]);

    function drawThumb() {
        if(!frame) return;
        tc.width=720; tc.height=1280;
        tctx.drawImage(frame, 0, 0, 720, 1280);
        tctx.font="bold 80px Impact"; tctx.textAlign="center"; tctx.fillStyle="#ffff00";
        tctx.strokeStyle="black"; tctx.lineWidth=10;
        const txt = document.getElementById('t1').value.toUpperCase();
        tctx.strokeText(txt, 360, document.getElementById('t1p').value);
        tctx.fillText(txt, 360, document.getElementById('t1p').value);
    }

    gasBtn.onclick = async () => {
        if(!v1.src || !v2.src) return alert("Pilih video dulu Mas Eko!");
        gasBtn.disabled = true;
        dlArea.innerHTML = '<label style="color:var(--neon)">HASIL UNDUH PART:</label>';
        
        c.width = 720; c.height = 1280;
        let currentTime = 0;
        let partCount = 1;

        // Jepret Thumbnail sesuai posisi kamera yang diatur
        v1.currentTime = 2;
        v1.onseeked = () => {
            frame = document.createElement('canvas'); frame.width=720; frame.height=1280;
            renderFrame(frame.getContext('2d'));
            drawThumb(); tc.style.display="block";
        };

        while (currentTime < v1.duration) {
            status.innerText = `⏳ Memproses Part ${partCount}...`;
            const duration = Math.min(60, v1.duration - currentTime);
            const partBlob = await recordPart(currentTime, duration);
            
            const btn = document.createElement('a');
            btn.href = URL.createObjectURL(partBlob);
            btn.download = `SENGKUNI_PART_${partCount}.mp4`;
            btn.className = 'part-btn';
            btn.style.display = 'block';
            btn.innerText = `📥 UNDUH PART ${partCount} (${Math.floor(duration)}s)`;
            dlArea.appendChild(btn);

            currentTime += duration;
            partCount++;
        }
        status.innerText = "✅ SELESAI SEMUA PART!";
        gasBtn.disabled = false;
    };

    function renderFrame(targetCtx) {
        const s = 1280 / v1.videoHeight;
        const nw = v1.videoWidth * s;
        // Rumus Geser Kamera: Berdasarkan slider 0-100
        const totalOverlap = nw - 720;
        const offset = (totalOverlap * zoomPos.value) / 100;
        
        targetCtx.drawImage(v1, -offset, 0, nw, 1280);
        targetCtx.drawImage(v2, 40, 930, 220, 300);
    }

    async function recordPart(start, duration) {
        return new Promise((resolve) => {
            v1.currentTime = start;
            v1.play(); v2.play();

            const audioCtx = new AudioContext();
            const source = audioCtx.createMediaElementSource(v1);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest); source.connect(audioCtx.destination);

            const stream = new MediaStream([...c.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
            const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];

            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => { audioCtx.close(); resolve(new Blob(chunks, {type: 'video/mp4'})); };

            const render = () => {
                if (rec.state === 'recording') {
                    renderFrame(ctx);
                    requestAnimationFrame(render);
                }
            };

            rec.start();
            render();
            setTimeout(() => { rec.stop(); v1.pause(); v2.pause(); }, duration * 1000);
        });
    }
</script>
</body>
</html>
