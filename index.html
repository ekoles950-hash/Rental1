<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Maker Pro - Console Mode</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 15px; }
        .box { background: #111; padding: 20px; border-radius: 20px; border: 3px solid #00ff00; }
        input, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: none; }
        button { background: #00ff00; font-weight: bold; cursor: pointer; }
        #log { background: #222; color: #00ff00; text-align: left; font-size: 10px; height: 100px; overflow-y: scroll; padding: 10px; border: 1px solid #444; margin-top: 10px; }
        canvas, video { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h3>🎬 SENGKUNI CONSOLE</h3>
        <input type="text" id="v_title" placeholder="Judul Youtube...">
        <input type="file" id="v1_in" accept="video/*">
        <input type="file" id="v2_in" accept="video/*">
        <button id="gasBtn">GABUNG & KIRIM</button>
        <div id="log">Console: Menunggu perintah Mas Eko...</div>
    </div>

    <video id="v1" crossorigin="anonymous" playsinline></video>
    <video id="v2" loop muted crossorigin="anonymous" playsinline></video>
    <canvas id="c" width="720" height="1280"></canvas>

    <script>
        const logBox = document.getElementById('log');
        function cetakLog(msg) { 
            logBox.innerHTML += "<br>> " + msg; 
            logBox.scrollTop = logBox.scrollHeight;
            console.log(msg);
        }

        const URL_REPLIZ = "https://api.repliz.com/public/upload";
        const TOKEN_REPLIZ = "ivylpP0kYeI20ooP9PJJ8H6iUumQJS7g";

        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        document.getElementById('v1_in').onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); cetakLog("Video 1 Ready"); };
        document.getElementById('v2_in').onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); cetakLog("Video 2 Ready"); };

        document.getElementById('gasBtn').onclick = async () => {
            cetakLog("Memulai Proses...");
            v1.play(); v2.play();
            
            const audioCtx = new AudioContext();
            const source = audioCtx.createMediaElementSource(v1);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest); source.connect(audioCtx.destination);

            const stream = new MediaStream([...canvas.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
            const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];

            rec.ondataavailable = (e) => chunks.push(e.data);
            v1.onended = () => rec.stop();

            rec.onstop = async () => {
                cetakLog("Rekaman Selesai. Durasi OK.");
                const blob = new Blob(chunks, { type: 'video/webm' });
                const formData = new FormData();
                formData.append('file', blob, 'video.webm');
                formData.append('title', document.getElementById('v_title').value);

                cetakLog("Mengirim ke Repliz...");
                try {
                    const res = await fetch(URL_REPLIZ, {
                        method: 'POST',
                        headers: { 'x-token': TOKEN_REPLIZ },
                        body: formData
                    });
                    if (res.ok) {
                        cetakLog("BERHASIL KIRIM KE YOUTUBE!");
                        alert("MANTAP MAS EKO!");
                    } else {
                        cetakLog("GAGAL: Error " + res.status);
                    }
                } catch (e) {
                    cetakLog("ERROR: " + e.message);
                }
            };

            rec.start();
            function draw() {
                if (rec.state === "recording") {
                    ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                    ctx.drawImage(v2, 40, canvas.height - 350, 220, 300);
                    requestAnimationFrame(draw);
                }
            }
            draw();
        };
    </script>
</body>
</html>
