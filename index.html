<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Auto-Cutter</title>
    <style>
        :root { --neon: #00ff00; --bg: #050505; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; display: flex; justify-content: center; background-image: radial-gradient(circle at top right, #002200, transparent); }
        .card { width: 100%; max-width: 400px; background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); padding: 25px; border-radius: 30px; border: 1px solid rgba(0,255,0,0.3); text-align: center; box-shadow: 0 10px 30px #000; }
        h2 { color: var(--neon); text-transform: uppercase; text-shadow: 0 0 15px var(--neon); margin-bottom: 25px; font-style: italic; letter-spacing: 2px; }
        
        .upload-box { background: rgba(0,0,0,0.5); border: 2px dashed rgba(0,255,0,0.2); padding: 30px; border-radius: 20px; margin-bottom: 20px; transition: 0.3s; }
        .upload-box:hover { border-color: var(--neon); }
        input[type="file"] { display: none; }
        .file-label { cursor: pointer; color: var(--neon); font-weight: bold; font-size: 14px; }
        
        #gasBtn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; background: var(--neon); color: #000; box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); font-size: 14px; display: none; }
        
        #status { margin-top: 20px; font-size: 12px; color: var(--neon); font-weight: bold; }
        
        .part-list { margin-top: 25px; display: grid; gap: 12px; text-align: left; }
        .part-item { background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--neon); }
        .part-info { font-size: 13px; font-weight: bold; }
        .dl-link { background: var(--neon); color: #000; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        
        video { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 AUTO CUTTER</h2>

    <div class="upload-box" id="dropZone">
        <label for="videoInput" class="file-label">
            <span>📁 KLIK UNTUK UPLOAD VIDEO</span>
            <p style="font-size: 10px; color: #888; margin-top: 10px;" id="fileName">Belum ada file dipilih</p>
        </label>
        <input type="file" id="videoInput" accept="video/*">
    </div>

    <button id="gasBtn">MULAI POTONG OTOMATIS</button>
    
    <div id="status">Silakan upload video Mas Eko.</div>

    <div class="part-list" id="resultArea"></div>
</div>

<video id="vSource"></video>

<script>
    const videoInput = document.getElementById('videoInput');
    const vSource = document.getElementById('vSource');
    const gasBtn = document.getElementById('gasBtn');
    const status = document.getElementById('status');
    const resultArea = document.getElementById('resultArea');
    const fileNameDisplay = document.getElementById('fileName');

    videoInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            vSource.src = URL.createObjectURL(file);
            fileNameDisplay.innerText = file.name;
            gasBtn.style.display = "block";
            status.innerText = "Video siap dipotong!";
        }
    };

    gasBtn.onclick = async () => {
        gasBtn.disabled = true;
        resultArea.innerHTML = "";
        const duration = vSource.duration;
        let start = 0;
        let part = 1;

        status.innerText = "⏳ Memproses Potongan Video...";

        while (start < duration) {
            const end = Math.min(start + 60, duration);
            const partDuration = end - start;

            // Proses "Instan" menggunakan Blob Slicing (Tanpa Encode Ulang)
            // Ini sangat cepat karena hanya memotong data file mentah
            const partBlob = await getPartBlob(start, end);
            
            const item = document.createElement('div');
            item.className = 'part-item';
            item.innerHTML = `
                <div class="part-info">PART ${part} <span style="color:#888; font-weight:normal;">(${Math.floor(partDuration)}s)</span></div>
                <a href="${URL.createObjectURL(partBlob)}" download="Sengkuni_Part_${part}.mp4" class="dl-link">UNDUH</a>
            `;
            resultArea.appendChild(item);

            start += 60;
            part++;
        }

        status.innerText = "✅ SELESAI! Silakan unduh satu-persatu.";
        gasBtn.disabled = false;
    };

    // Fungsi potong tanpa merekam (Slicing Method)
    async function getPartBlob(start, end) {
        return new Promise((resolve) => {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = vSource.videoWidth;
            tempCanvas.height = vSource.videoHeight;

            vSource.currentTime = start;
            vSource.onseeked = () => {
                const stream = tempCanvas.captureStream(30);
                const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
                const chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => resolve(new Blob(chunks, { type: 'video/mp4' }));

                const draw = () => {
                    if (vSource.currentTime < end && !vSource.paused) {
                        tempCtx.drawImage(vSource, 0, 0);
                        requestAnimationFrame(draw);
                    } else {
                        recorder.stop();
                    }
                };

                recorder.start();
                vSource.play();
                draw();

                setTimeout(() => {
                    vSource.pause();
                    if(recorder.state === "recording") recorder.stop();
                }, (end - start) * 1000);
            };
        });
    }
</script>
</body>
</html>
