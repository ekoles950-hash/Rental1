<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Cutter - Repliz Auto Schedule</title>
    <style>
        :root { --neon: #00ff00; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; display: flex; justify-content: center; background-image: radial-gradient(circle at top right, #002200, transparent); }
        .card { width: 100%; max-width: 420px; background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); padding: 25px; border-radius: 30px; border: 1px solid rgba(0,255,0,0.3); text-align: center; }
        h2 { color: var(--neon); text-transform: uppercase; text-shadow: 0 0 15px var(--neon); margin-bottom: 20px; font-style: italic; }
        
        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 10px; color: var(--neon); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid #333; padding: 10px; border-radius: 10px; color: #fff; box-sizing: border-box; font-size: 13px; }
        textarea { height: 60px; resize: none; }

        .upload-box { background: rgba(0,0,0,0.5); border: 2px dashed rgba(0,255,0,0.2); padding: 20px; border-radius: 15px; margin-bottom: 15px; cursor: pointer; }
        #gasBtn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; background: var(--neon); color: #000; cursor: pointer; display: none; box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); }
        
        .part-item { background: #111; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-top: 10px; border-left: 5px solid var(--neon); text-align: left; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .repliz-btn { background: #fff; color: #000; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: bold; flex: 1; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 SENGKUNI REPLIZ</h2>

    <div class="input-group">
        <label>Judul Konten</label>
        <input type="text" id="c_title" placeholder="Contoh: Video Horeg Part 1">
    </div>
    <div class="input-group">
        <label>Deskripsi</label>
        <textarea id="c_desc" placeholder="Isi deskripsi konten..."></textarea>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group">
            <label>Privasi</label>
            <select id="c_privacy">
                <option value="public">Publik</option>
                <option value="private">Pribadi</option>
            </select>
        </div>
        <div class="input-group">
            <label>Jadwal Post</label>
            <input type="datetime-local" id="c_schedule">
        </div>
    </div>

    <div class="upload-box" onclick="document.getElementById('videoInput').click()">
        <label style="cursor:pointer; color:var(--neon); font-size: 12px;">📁 UPLOAD VIDEO</label>
        <input type="file" id="videoInput" accept="video/*" style="display:none;">
    </div>

    <button id="gasBtn">GAS POTONG & AUTO-DATA</button>
    <div id="status" style="margin-top:10px; font-size:12px; color:var(--neon);">Ready Mas Eko!</div>
    <div id="resultArea"></div>
</div>

<video id="vSource" style="display:none;"></video>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyC_JLl-wwjrnT0xPdKrAW9xXyuCbLo4IcNxQWgy77xnBOpI-54qpOJ-J0w5pSUB4dL/exec";
    const vInput = document.getElementById('videoInput');
    const vSource = document.getElementById('vSource');
    const gasBtn = document.getElementById('gasBtn');
    const resultArea = document.getElementById('resultArea');

    vInput.onchange = (e) => {
        if(e.target.files[0]) {
            vSource.src = URL.createObjectURL(e.target.files[0]);
            gasBtn.style.display = "block";
        }
    };

    gasBtn.onclick = async () => {
        gasBtn.disabled = true;
        resultArea.innerHTML = "";
        let start = 0; let part = 1;
        while (start < vSource.duration) {
            document.getElementById('status').innerText = `⏳ Potong Part ${part}...`;
            const end = Math.min(start + 60, vSource.duration);
            const blob = await convertTo916(start, end);
            addPartItem(part, blob);
            start += 60; part++;
        }
        document.getElementById('status').innerText = "✅ Selesai!"; gasBtn.disabled = false;
    };

    function addPartItem(part, blob) {
        const item = document.createElement('div');
        item.className = 'part-item';
        item.innerHTML = `<strong>PART ${part}</strong>`;
        const repliz = document.createElement('button');
        repliz.className = 'repliz-btn'; repliz.innerText = "🚀 KIRIM + DATA KE REPLIZ";
        repliz.onclick = () => sendToRepliz(blob, part, repliz);
        item.appendChild(repliz); resultArea.appendChild(item);
    }

    async function sendToRepliz(blob, part, btn) {
        btn.innerText = "⏳ Mengirim..."; btn.disabled = true;
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const payload = {
                videoData: reader.result.split(',')[1],
                fileName: `Part_${part}.mp4`,
                title: document.getElementById('c_title').value || `Video Part ${part}`,
                description: document.getElementById('c_desc').value,
                privacy: document.getElementById('c_privacy').value,
                schedule: document.getElementById('c_schedule').value
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                btn.innerText = "✅ TERKIRIM KE JADWAL"; btn.style.background = "#00ff00";
            } catch (e) { btn.innerText = "❌ GAGAL"; btn.disabled = false; }
        };
    }

    async function convertTo916(start, end) {
        return new Promise((resolve) => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 720; canvas.height = 1280;
            vSource.currentTime = start;
            vSource.onseeked = () => {
                const audioCtx = new AudioContext();
                const source = audioCtx.createMediaElementSource(vSource);
                const dest = audioCtx.createMediaStreamDestination();
                source.connect(dest);
                const stream = new MediaStream([...canvas.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
                const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
                const chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => { audioCtx.close(); resolve(new Blob(chunks, { type: 'video/mp4' })); };
                const render = () => {
                    if (vSource.currentTime < end && !vSource.paused) {
                        const s = 1280/vSource.videoHeight; const nw = vSource.videoWidth*s;
                        ctx.drawImage(vSource, -(nw-720)/2, 0, nw, 1280);
                        requestAnimationFrame(render);
                    } else { rec.stop(); }
                };
                rec.start(); vSource.play(); render();
                setTimeout(() => { vSource.pause(); if(rec.state === "recording") rec.stop(); }, (end - start) * 1000);
            };
        });
    }
</script>
</body>
</html>
