<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Maker v.Final - Direct YT</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .box { background: #111; padding: 25px; border-radius: 20px; border: 3px solid #00ff00; box-shadow: 0 0 15px #00ff00; max-width: 400px; margin: auto; }
        input, button { width: 100%; margin: 10px 0; padding: 15px; border-radius: 10px; border: none; box-sizing: border-box; }
        button { background: #00ff00; color: #000; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #444; color: #888; }
        #status { margin-top: 20px; color: #00ff00; font-weight: bold; font-size: 13px; }
        canvas, video { display: none; }
        .log-box { font-size: 10px; color: #888; margin-top: 10px; text-align: left; background: #222; padding: 5px; height: 50px; overflow: hidden; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h3>🎬 SENGKUNI AUTO POST</h3>
        <p style="font-size: 11px; color: #888;">LANGSUNG KE YOUTUBE PANTELO</p>
        
        <input type="text" id="v_title" placeholder="Ketik Judul Youtube...">
        
        <input type="file" id="v1_in" accept="video/*">
        <p style="font-size: 10px; margin-top:-5px;">Video Utama (Patokan Durasi)</p>
        
        <input type="file" id="v2_in" accept="video/*">
        <p style="font-size: 10px; margin-top:-5px;">Video Reaksi (Mute)</p>
        
        <button id="gasBtn">GABUNG & POST KE YT</button>
        <div id="status">Ready, Mas Eko!</div>
        <div class="log-box" id="log">Log: Siap eksekusi...</div>
    </div>

    <video id="v1" crossorigin="anonymous" playsinline></video>
    <video id="v2" loop muted crossorigin="anonymous" playsinline></video>
    <canvas id="c" width="720" height="1280"></canvas>

    <script>
        // LINK SAKTI MAS EKO
        const URL_GAS = "https://script.google.com/macros/s/AKfycbxj0RVx9jgAl0DtsqZZ_cLGTCvsqs3-gmB4Vc29PYz-Up98ZOvTwGtnuJ06F1yzTM--/exec";

        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const log = document.getElementById('log');
        const gasBtn = document.getElementById('gasBtn');

        document.getElementById('v1_in').onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); log.innerText = "Video 1 Ok"; };
        document.getElementById('v2_in').onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); log.innerText = "Video 2 Ok"; };

        gasBtn.onclick = async () => {
            if (!v1.src || !v2.src) return alert("Pilih video dulu Mas!");
            if (!document.getElementById('v_title').value) return alert("Isi judul dulu!");

            gasBtn.disabled = true;
            status.innerText = "⏳ SEDANG MEREKAM FULL DURASI...";
            log.innerText = "Recording started...";

            v1.currentTime = 0; v2.currentTime = 0;
            await v1.play(); v2.play();

            // Audio Setup
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(v1);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest); source.connect(audioCtx.destination);

            const stream = new MediaStream([...canvas.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
            const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];

            rec.ondataavailable = (e) => chunks.push(e.data);
            
            // Berhenti pas video utama habis
            v1.onended = () => { if(rec.state === "recording") rec.stop(); };

            rec.onstop = async () => {
                status.innerText = "🚀 SEDANG TERBANG KE YOUTUBE...";
                log.innerText = "Encoding to Base64...";
                
                const blob = new Blob(chunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    
                    const formData = new URLSearchParams();
                    formData.append('file', base64);
                    formData.append('title', document.getElementById('v_title').value);

                    try {
                        const res = await fetch(URL_GAS, {
                            method: 'POST',
                            body: formData,
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                        });
                        const text = await res.text();
                        status.innerText = "✅ " + text;
                        log.innerText = "Upload Success!";
                        alert("MANTAP MAS EKO! Video sudah masuk ke YouTube.");
                    } catch (e) {
                        status.innerText = "❌ Gagal: Masalah Sinyal.";
                        log.innerText = "Error: " + e.message;
                    }
                    gasBtn.disabled = false;
                };
                reader.readAsDataURL(blob);
            };

            rec.start();
            function draw() {
                if (rec.state === "recording") {
                    ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                    ctx.drawImage(v2, 40, canvas.height - 350, 220, 300);
                    requestAnimationFrame(draw);
                }
            }
            draw();
        };
    </script>
</body>
</html>
