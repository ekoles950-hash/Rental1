<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Overlay Pro</title>
    <style>
        :root { --neon: #00ff00; --bg: #0a0a0a; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 20px; border-radius: 24px; border: 1px solid var(--neon); text-align: center; }
        
        /* BOX PREVIEW OVERLAY */
        #video-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 15px; 
            overflow: hidden; 
            margin-top: 15px;
            border: 2px solid #333;
        }
        #v1-view { width: 100%; height: 100%; object-fit: cover; }
        #v2-view { 
            position: absolute; 
            bottom: 10px; 
            right: 10px; 
            width: 30%; 
            border: 2px solid var(--neon); 
            border-radius: 10px; 
            z-index: 10;
        }

        .input-group { margin-bottom: 10px; text-align: left; }
        label { display: block; font-size: 10px; color: var(--neon); font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; background: #000; border: 1px solid #333; padding: 10px; border-radius: 10px; color: #fff; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; background: var(--neon); color: #000; cursor: pointer; margin-top: 10px; }
        
        #status { margin-top: 15px; font-size: 12px; color: var(--neon); font-weight: bold; }
        .thumb-area { width: 100%; margin-top: 15px; border: 1px dashed var(--neon); padding: 10px; border-radius: 10px; display: none; }
        #canvas-thumb { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 SENGKUNI OVERLAY</h2>

    <div class="input-group">
        <label>Teks Utama & Posisi</label>
        <input type="text" id="t1" placeholder="Ketik Judul..." oninput="updateThumb()">
        <input type="range" id="t1p" min="50" max="680" value="100" oninput="updateThumb()">
    </div>

    <div class="input-group">
        <label>Pilih Detik Jepret: <span id="time_val">5s</span></label>
        <input type="range" id="stime" min="1" max="60" value="5" oninput="updateTime(this.value)">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group"><label>Horeg (Suara)</label><input type="file" id="v1i" accept="video/*"></div>
        <div class="input-group"><label>Reaksi (Mute)</label><input type="file" id="v2i" accept="video/*"></div>
    </div>

    <div id="video-container">
        <video id="v1-view" playsinline></video>
        <video id="v2-view" loop muted playsinline></video>
    </div>

    <button id="playBtn">▶️ MULAI GABUNG (LIVE)</button>
    <button id="saveBtn" style="background: #fff; display:none;">💾 SIMPAN HASIL VIDEO</button>
    
    <div id="status">Ready Mas Eko! Tanpa Nunggu.</div>

    <div class="thumb-area" id="thumb-box">
        <label>HASIL THUMBNAIL:</label>
        <canvas id="canvas-thumb"></canvas>
        <button id="dlThumb" style="background:#333; color:#fff; font-size:10px;">📥 DOWNLOAD FOTO</button>
    </div>
</div>

<script>
    const v1 = document.getElementById('v1-view');
    const v2 = document.getElementById('v2-view');
    const status = document.getElementById('status');
    const thumbCanvas = document.getElementById('canvas-thumb');
    const tctx = thumbCanvas.getContext('2d');
    let bgFrame = null;

    // Load Video
    document.getElementById('v1i').onchange = (e) => {
        v1.src = URL.createObjectURL(e.target.files[0]);
        v1.onloadedmetadata = () => {
            document.getElementById('stime').max = Math.floor(v1.duration);
            status.innerText = "Video Horeg Loaded!";
        };
    };
    document.getElementById('v2i').onchange = (e) => v2.src = URL.createObjectURL(e.target.files[0]);

    function updateTime(v) { 
        document.getElementById('time_val').innerText = v + "s";
        v1.currentTime = v; // Preview jepretan
        v1.onseeked = () => {
            bgFrame = document.createElement('canvas');
            bgFrame.width = 1280; bgFrame.height = 720;
            bgFrame.getContext('2d').drawImage(v1, 0, 0, 1280, 720);
            updateThumb();
            document.getElementById('thumb-box').style.display = "block";
        };
    }

    function updateThumb() {
        if(!bgFrame) return;
        thumbCanvas.width = 1280; thumbCanvas.height = 720;
        tctx.drawImage(bgFrame, 0, 0, 1280, 720);
        tctx.textAlign = "center"; tctx.strokeStyle = "black"; tctx.lineWidth = 10;
        tctx.font = "bold 80px Impact"; tctx.fillStyle = "#ffff00";
        const txt = document.getElementById('t1').value.toUpperCase();
        tctx.strokeText(txt, 640, document.getElementById('t1p').value);
        tctx.fillText(txt, 640, document.getElementById('t1p').value);
    }

    // Fungsi Play Bareng
    document.getElementById('playBtn').onclick = () => {
        if(!v1.src || !v2.src) return alert("Pilih video dulu!");
        v1.currentTime = 0;
        v2.currentTime = 0;
        v1.play();
        v2.play();
        status.innerText = "🔊 SEDANG JALAN... DURASI IKUT HOREG!";
        
        v1.onended = () => {
            v2.pause();
            status.innerText = "✅ SELESAI!";
        };
    };

    document.getElementById('dlThumb').onclick = () => {
        const a = document.createElement('a');
        a.href = thumbCanvas.toDataURL('image/jpeg');
        a.download = 'THUMBNAIL_SENGKUNI.jpg';
        a.click();
    };
</script>
</body>
</html>
