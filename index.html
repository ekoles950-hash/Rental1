<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Direct YouTube</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 15px; }
        .box { background: #111; padding: 20px; border-radius: 20px; border: 3px solid #00ff00; box-shadow: 0 0 15px #00ff00; max-width: 450px; margin: auto; }
        input, select, button, textarea { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #00ff00; color: #000; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { margin-top: 15px; color: #00ff00; font-weight: bold; font-size: 13px; }
        #previewVideo { width: 100%; border-radius: 10px; margin-top: 15px; display: none; border: 2px solid #00ff00; }
        .label { font-size: 11px; color: #888; text-align: left; margin: 5px 0 0 5px; }
        canvas, .raw-video { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h3>🎬 SENGKUNI DIRECT YOUTUBE</h3>
    <input type="text" id="v_title" placeholder="Judul Video YouTube...">
    <textarea id="v_desc" placeholder="Deskripsi Video..." style="height:60px;"></textarea>

    <input type="file" id="v1_in" accept="video/*">
    <div class="label">Video Utama (Suara & Durasi)</div>
    <input type="file" id="v2_in" accept="video/*">
    <div class="label">Video Reaksi (Loop & Bisu)</div>

    <button id="gasBtn">1. GABUNG VIDEO</button>
    <button id="uploadBtn" style="background:#ff0000; color:#fff; display:none;">2. LOGIN & UPLOAD KE YOUTUBE</button>
    
    <div id="status">Ready Mas Eko!</div>
    <video id="previewVideo" controls></video>
</div>

<video id="v1" class="raw-video" crossorigin="anonymous" playsinline></video>
<video id="v2" class="raw-video" loop muted crossorigin="anonymous" playsinline></video>
<canvas id="c"></canvas>

<script>
    // --- MASUKKAN CLIENT ID MAS EKO DI SINI ---
    const CLIENT_ID = "MASUKKAN_CLIENT_ID_DARI_GOOGLE_CLOUD_MAS.apps.googleusercontent.com";
    
    let finalBlob = null;
    let accessToken = null;

    const v1 = document.getElementById('v1');
    const v2 = document.getElementById('v2');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const uploadBtn = document.getElementById('uploadBtn');
    const preview = document.getElementById('previewVideo');

    document.getElementById('v1_in').onchange = (e) => v1.src = URL.createObjectURL(e.target.files[0]);
    document.getElementById('v2_in').onchange = (e) => v2.src = URL.createObjectURL(e.target.files[0]);

    // 1. PROSES GABUNG VIDEO
    document.getElementById('gasBtn').onclick = async () => {
        if(!v1.src || !v2.src || !document.getElementById('v_title').value) return alert("Data belum lengkap Mas!");
        
        canvas.width = 720; canvas.height = 1280;
        status.innerText = "⏳ Sedang Menggabung Video & Suara...";
        uploadBtn.style.display = "none";
        preview.style.display = "none";

        v1.currentTime = 0; v2.currentTime = 0;
        await v1.play(); v2.play();

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(v1);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest); source.connect(audioCtx.destination);

        const stream = new MediaStream([...canvas.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
        const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
        let chunks = [];

        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            finalBlob = new Blob(chunks, { type: 'video/mp4' });
            preview.src = URL.createObjectURL(finalBlob);
            preview.style.display = "block";
            uploadBtn.style.display = "block";
            status.innerText = "✅ Gabung Selesai! Cek video di bawah, lalu klik tombol merah.";
        };

        v1.onended = () => rec.stop();
        rec.start();

        function draw() {
            if(rec.state === "recording") {
                ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                ctx.drawImage(v2, 40, 900, 220, 300);
                requestAnimationFrame(draw);
            }
        }
        draw();
    };

    // 2. PROSES LOGIN & UPLOAD
    uploadBtn.onclick = () => {
        if (!CLIENT_ID.includes(".apps")) return alert("Mas Eko, isi Client ID dulu di kodingannya!");
        
        const client = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/youtube.upload',
            callback: (response) => {
                if (response.access_token) {
                    accessToken = response.access_token;
                    mulaiUploadKeYouTube();
                }
            },
        });
        client.requestAccessToken();
    };

    async function mulaiUploadKeYouTube() {
        status.innerText = "🚀 Menghubungi Server YouTube...";
        const metadata = {
            snippet: {
                title: document.getElementById('v_title').value,
                description: document.getElementById('v_desc').value,
                categoryId: '22'
            },
            status: { privacyStatus: 'public' }
        };

        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', finalBlob);

        try {
            const res = await fetch('https://www.googleapis.com/upload/youtube/v3/videos?uploadType=multipart&part=snippet,status', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken },
                body: form
            });
            const data = await res.json();
            if(data.id) {
                status.innerText = "✅ BERHASIL! Video ID: " + data.id;
                alert("MANTAP MAS EKO! Video sudah terbang ke akun YouTube Mas.");
            } else {
                status.innerText = "❌ Gagal: " + (data.error ? data.error.message : "Cek kuota API");
            }
        } catch (e) {
            status.innerText = "❌ Error Koneksi.";
        }
    }
</script>
</body>
</html>
