<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colab Mas Eko - Sengkuni Net</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { margin-bottom: 15px; text-align: center; }
        .header h2 { font-size: 18px; color: #ff0000; margin: 5px 0; }
        
        /* Wadah Utama Colab */
        .colab-wrapper { 
            display: flex; 
            justify-content: center; 
            gap: 4px; 
            width: 100%; 
            max-width: 400px; 
            background: #1a1a1a; 
            padding: 5px; 
            border-radius: 15px; 
            border: 2px solid #333;
        }

        .video-container { flex: 1; position: relative; }
        
        /* Pengaturan Frame agar pas */
        iframe { 
            width: 100%; 
            height: 450px; /* Tinggi disesuaikan untuk layar HP */
            border-radius: 10px; 
            border: none;
        }

        .label-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🚀 Preview Colab Otomatis</h2>
        <p style="font-size: 12px; color: #ccc;">Video Mas Eko & Target</p>
    </div>

    <div class="colab-wrapper">
        <div class="video-container">
            <span class="label-tag">Mas Eko</span>
            <iframe src="https://www.youtube.com/embed/BzjCPKswlGo?autoplay=1&mute=1&loop=1&playlist=BzjCPKswlGo" allowfullscreen></iframe>
        </div>

        <div class="video-container">
            <span class="label-tag">Target</span>
            <iframe src="https://www.youtube.com/embed/xR998gKpYaw?autoplay=1&mute=1&loop=1&playlist=xR998gKpYaw" allowfullscreen></iframe>
        </div>
    </div>

    <div style="margin-top: 20px; font-size: 11px; color: #555;">
        Vercel Project: rental1-five
    </div>

</body>
</html>
