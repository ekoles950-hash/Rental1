<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengkuni Maker Pro - Full Durasi</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .box { background: #111; padding: 25px; border-radius: 20px; border: 3px solid #00ff00; box-shadow: 0 0 15px #00ff00; max-width: 400px; margin: auto; }
        input { width: 100%; margin: 10px 0; background: #222; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; }
        button { background: #00ff00; color: #000; border: none; padding: 20px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #status { margin-top: 20px; color: #00ff00; font-weight: bold; }
        canvas, video { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🎬 SENGKUNI HOREG</h2>
        <p style="font-size: 12px; color: #888;">DURASI OTOMATIS SESUAI VIDEO UTAMA</p>
        
        <input type="file" id="v1_in" accept="video/*">
        <p style="font-size: 10px;">Video Utama (Patokan Durasi)</p>
        
        <input type="file" id="v2_in" accept="video/*">
        <p style="font-size: 10px;">Video Reaksi (Mute)</p>
        
        <button id="gasBtn">GABUNG & DOWNLOAD</button>
        <div id="status">Ready Mas Eko!</div>
    </div>

    <video id="v1" crossorigin="anonymous" playsinline></video>
    <video id="v2" loop muted crossorigin="anonymous" playsinline></video>
    <canvas id="c" width="720" height="1280"></canvas>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const gasBtn = document.getElementById('gasBtn');

        document.getElementById('v1_in').onchange = (e) => { v1.src = URL.createObjectURL(e.target.files[0]); };
        document.getElementById('v2_in').onchange = (e) => { v2.src = URL.createObjectURL(e.target.files[0]); };

        gasBtn.onclick = async () => {
            if (!v1.src || !v2.src) return alert("Pilih kedua videonya dulu!");
            
            gasBtn.disabled = true;
            status.innerText = "⏳ SEDANG MEREKAM... JANGAN TUTUP TAB INI!";

            // Tunggu video siap
            await v1.play();
            await v2.play();
            
            // Audio Setup
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(v1);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest);
            source.connect(audioCtx.destination);

            const stream = new MediaStream([
                ...canvas.captureStream(30).getVideoTracks(), 
                ...dest.stream.getAudioTracks()
            ]);

            const rec = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
            let chunks = [];

            rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            
            // INI KUNCINYA: Recorder HANYA berhenti kalau v1 (video utama) selesai
            v1.onended = () => {
                if (rec.state === "recording") {
                    rec.stop();
                }
            };

            rec.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Sengkuni_Horeg_" + Date.now() + ".webm";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                status.innerText = "✅ SELESAI! SUDAH MASUK DOWNLOAD.";
                gasBtn.disabled = false;
                v1.pause(); v2.pause();
            };

            rec.start();

            function draw() {
                if (rec.state === "recording") {
                    // Gambar background (Video Utama)
                    ctx.drawImage(v1, 0, 0, canvas.width, canvas.height);
                    // Gambar overlay (Video Reaksi)
                    ctx.drawImage(v2, 40, canvas.height - 350, 220, 300);
                    requestAnimationFrame(draw);
                }
            }
            draw();
        };
    </script>
</body>
</html>
