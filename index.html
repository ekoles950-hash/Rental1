<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Colab Preview - Mas Eko</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; text-align: center; padding: 15px; margin: 0; }
        .header { margin-bottom: 20px; }
        .input-group { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        input { padding: 12px; width: 80%; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #ff0000; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 85%; }
        
        .colab-frame { display: flex; justify-content: center; align-items: center; gap: 5px; max-width: 100%; overflow: hidden; margin: 0 auto; }
        .video-box { flex: 1; max-width: 180px; } /* Ukuran disesuaikan agar pas di layar HP side-by-side */
        
        iframe { width: 100%; height: 320px; border-radius: 10px; border: 1px solid #333; background: #111; }
        .label { font-size: 12px; margin-bottom: 8px; color: #ffcc00; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <h3>🚀 Auto Colab Preview</h3>
        <p style="font-size: 13px; color: #aaa;">Tempel link Shorts buat simulasi konten affiliate</p>
    </div>

    <div class="input-group">
        <input type="text" id="shortLink" placeholder="Tempel link YouTube Shorts di sini...">
        <button onclick="updateColab()">TAMPILKAN COLAB</button>
    </div>

    <div class="colab-frame">
        <div class="video-box">
            <div class="label">Video Kamu</div>
            <iframe id="myVideo" src="https://www.youtube.com/embed/P-Y3w0kQo50" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="video-box">
            <div class="label">Video Target</div>
            <iframe id="targetVideo" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function updateColab() {
            const link = document.getElementById('shortLink').value;
            const targetIframe = document.getElementById('targetVideo');
            
            let videoId = "";
            // Logika deteksi ID video yang lebih kuat
            if (link.includes("shorts/")) {
                videoId = link.split("shorts/")[1].split(/[?&]/)[0];
            } else if (link.includes("v=")) {
                videoId = link.split("v=")[1].split(/[?&]/)[0];
            } else if (link.includes("youtu.be/")) {
                videoId = link.split("youtu.be/")[1].split(/[?&]/)[0];
            }

            if (videoId) {
                targetIframe.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1&mute=1";
            } else {
                alert("Waduh Mas Eko, linknya kayaknya salah. Coba dicek lagi ya!");
            }
        }
    </script>

</body>
</html>
