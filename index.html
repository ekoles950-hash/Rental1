<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Clipper AI - Simpan & Rangkum Web</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const apiKey = ""; // Disediakan oleh environment
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        const App = () => {
            const [url, setUrl] = useState('');
            const [loading, setLoading] = useState(false);
            const [clips, setClips] = useState([]);
            const [viewMode, setViewMode] = useState('grid');
            const [activeTab, setActiveTab] = useState('Semua');
            const [error, setError] = useState(null);

            // Load dari local storage
            useEffect(() => {
                const saved = localStorage.getItem('web-clipper-data');
                if (saved) setClips(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('web-clipper-data', JSON.stringify(clips));
            }, [clips]);

            // Exponential Backoff API Call
            const fetchGemini = async (prompt, retries = 0) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            tools: [{ "google_search": {} }],
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        title: { type: "STRING" },
                                        summary: { type: "STRING" },
                                        keyPoints: { type: "ARRAY", items: { type: "STRING" } },
                                        category: { type: "STRING" }
                                    }
                                }
                            }
                        })
                    });

                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    if (retries < 5) {
                        await new Promise(res => setTimeout(res, delays[retries]));
                        return fetchGemini(prompt, retries + 1);
                    }
                    throw err;
                }
            };

            const handleClip = async (e) => {
                e.preventDefault();
                if (!url.startsWith('http')) {
                    setError("Masukkan URL lengkap (http/https)");
                    return;
                }

                setLoading(true);
                setError(null);

                const prompt = `Analisis URL ini dan rangkum isinya dalam Bahasa Indonesia: ${url}`;

                try {
                    const result = await fetchGemini(prompt);
                    const newClip = {
                        id: Date.now(),
                        url: url,
                        date: new Date().toLocaleDateString('id-ID'),
                        ...result
                    };
                    setClips(prev => [newClip, ...prev]);
                    setUrl('');
                } catch (err) {
                    setError("Gagal mengambil data. Coba link lain.");
                } finally {
                    setLoading(false);
                }
            };

            const deleteClip = (id) => {
                setClips(clips.filter(c => c.id !== id));
            };

            const categories = ['Semua', ...new Set(clips.map(c => c.category))];
            const filteredClips = activeTab === 'Semua' 
                ? clips 
                : clips.filter(c => c.category === activeTab);

            // Icon Component Helper
            const Icon = ({ name, size = 20, className = "" }) => {
                useEffect(() => {
                    lucide.createIcons();
                }, [name, clips, viewMode]);
                return <i data-lucide={name} className={`${className}`} style={{ width: size, height: size }}></i>;
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-indigo-600 p-2 rounded-xl text-white">
                                    <Icon name="scissors" />
                                </div>
                                <h1 className="text-xl font-extrabold tracking-tight">Web<span className="text-indigo-600">Clipper</span></h1>
                            </div>
                            <div className="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase tracking-widest">
                                AI Powered
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 pt-12">
                        {/* Input Area */}
                        <div className="max-w-2xl mx-auto mb-16 text-center">
                            <h2 className="text-3xl font-bold text-slate-900 mb-4">Simpan apa pun dari web.</h2>
                            <p className="text-slate-500 mb-8">Tempelkan tautan dan biarkan AI kami merangkum poin-poin penting untuk Anda.</p>
                            
                            <form onSubmit={handleClip} className="relative">
                                <input 
                                    type="text" 
                                    placeholder="Tempel link artikel di sini..."
                                    className="w-full pl-6 pr-36 py-4 bg-white border-2 border-slate-200 rounded-2xl shadow-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50/50 outline-none transition-all"
                                    value={url}
                                    onChange={(e) => setUrl(e.target.value)}
                                />
                                <button 
                                    disabled={loading}
                                    className="absolute right-2 top-2 bottom-2 px-6 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold flex items-center gap-2 transition-all disabled:opacity-50"
                                >
                                    {loading ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="plus" />}
                                    {loading ? 'Menganalisis...' : 'Simpan'}
                                </button>
                            </form>
                            {error && <p className="mt-3 text-red-500 text-sm font-medium">{error}</p>}
                        </div>

                        {/* Filter & View Toggle */}
                        <div className="flex flex-wrap items-center justify-between gap-4 mb-8">
                            <div className="flex items-center gap-2 overflow-x-auto no-scrollbar pb-2">
                                {categories.map(cat => (
                                    <button 
                                        key={cat}
                                        onClick={() => setActiveTab(cat)}
                                        className={`px-4 py-2 rounded-full text-sm font-semibold transition-all whitespace-nowrap ${
                                            activeTab === cat ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'
                                        }`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                            <div className="flex bg-white border border-slate-200 p-1 rounded-xl">
                                <button onClick={() => setViewMode('grid')} className={`p-2 rounded-lg ${viewMode === 'grid' ? 'bg-slate-100 text-indigo-600' : 'text-slate-400'}`}>
                                    <Icon name="layout-grid" size={18} />
                                </button>
                                <button onClick={() => setViewMode('list')} className={`p-2 rounded-lg ${viewMode === 'list' ? 'bg-slate-100 text-indigo-600' : 'text-slate-400'}`}>
                                    <Icon name="list" size={18} />
                                </button>
                            </div>
                        </div>

                        {/* List of Clips */}
                        {clips.length === 0 ? (
                            <div className="py-20 text-center bg-white rounded-3xl border border-dashed border-slate-300">
                                <div className="mb-4 inline-block p-4 bg-slate-50 rounded-full text-slate-300">
                                    <Icon name="bookmark" size={40} />
                                </div>
                                <h3 className="text-lg font-bold text-slate-600">Koleksi masih kosong</h3>
                                <p className="text-slate-400">Belum ada link yang Anda kliping.</p>
                            </div>
                        ) : (
                            <div className={viewMode === 'grid' ? "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" : "space-y-4"}>
                                {filteredClips.map(clip => (
                                    <div key={clip.id} className="group bg-white rounded-2xl border border-slate-200 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
                                        <div className="p-6">
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="px-2 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-bold uppercase tracking-wider rounded">
                                                    {clip.category}
                                                </span>
                                                <button onClick={() => deleteClip(clip.id)} className="text-slate-300 hover:text-red-500 transition-colors">
                                                    <Icon name="trash-2" size={16} />
                                                </button>
                                            </div>
                                            <h4 className="text-lg font-bold mb-3 leading-tight group-hover:text-indigo-600 transition-colors line-clamp-2">
                                                {clip.title}
                                            </h4>
                                            <p className="text-sm text-slate-500 mb-4 line-clamp-3 italic">
                                                "{clip.summary}"
                                            </p>
                                            <ul className="space-y-2 mb-6">
                                                {clip.keyPoints.slice(0, 3).map((point, i) => (
                                                    <li key={i} className="flex items-start gap-2 text-xs text-slate-600 font-medium">
                                                        <div className="w-1.5 h-1.5 rounded-full bg-indigo-400 mt-1.5 shrink-0"></div>
                                                        {point}
                                                    </li>
                                                ))}
                                            </ul>
                                            <div className="flex items-center justify-between pt-4 border-t border-slate-50">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">{clip.date}</span>
                                                <a href={clip.url} target="_blank" className="flex items-center gap-1 text-xs font-bold text-indigo-600 hover:underline">
                                                    Sumber <Icon name="external-link" size={12} />
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
